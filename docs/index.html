<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBK Dynamic Market Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript" src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { font-family: Arial, Helvetica, sans-serif !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #334155; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-800 text-white font-sans min-h-screen flex flex-col selection:bg-slate-500 selection:text-slate-50">

    <div id="loading-screen" class="fixed inset-0 z-[70] bg-slate-800 flex flex-col items-center justify-center p-6 text-center transition-opacity duration-500">
        <div class="text-4xl mb-8">📈</div>
        <div id="loading-quote" class="text-slate-50 text-xl sm:text-2xl font-medium max-w-lg mb-3 leading-relaxed transition-opacity duration-300">Loading...</div>
        <div id="loading-attribution" class="text-slate-400 text-base mb-10"></div>
        <div class="w-9 h-9 border-2 border-slate-400 border-t-sky-500 rounded-full animate-spin mb-6"></div>
        <div id="loading-status" class="text-slate-300 text-base font-mono">INITIALIZING DATA ENGINE...</div>
    </div>

    <div class="flex-1 flex flex-col max-w-[1300px] w-full mx-auto p-4 md:p-6 space-y-4 overflow-hidden">

        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-3 border-b border-slate-500 gap-3 shrink-0">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                    <span>📈</span> RBK DYNAMIC MARKET SCREENER
                </h1>
                <p class="text-base text-slate-300 mt-1 font-mono" id="all-directory-count">INITIALIZING DATA ENGINE...</p>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
                <div id="market-sentiment-badge" class="hidden"></div>
                <div class="flex items-center gap-2 bg-slate-700 border border-slate-500 px-3 py-2 rounded-xl font-mono text-sm text-slate-200">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span>DATA SYNCED</span>
                </div>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="shrink-0">
            <input type="text" id="search-input" oninput="renderList()" placeholder="🔍 Search by symbol or company name..."
                   class="w-full bg-slate-700 border border-slate-500 text-base rounded-xl px-4 py-3.5 text-slate-50 placeholder-slate-400 focus:outline-none focus:border-sky-700 font-mono transition-colors">
        </div>

        <!-- VIEW TABS -->
        <div class="flex flex-col gap-3 shrink-0 bg-slate-800 p-3 rounded-xl border border-slate-600">
            <div class="flex flex-wrap items-center gap-2 w-full">
                <button onclick="loadView('momentum')" id="btn-view-momentum" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-600 text-slate-50 border border-slate-400 whitespace-nowrap">🚀 MOMENTUM</button>
                <button onclick="loadView('traded')" id="btn-view-traded" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">🔥 MOST TRADED</button>
                <button onclick="loadView('bullish')" id="btn-view-bullish" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">📈 TOP GAINERS</button>
                <button onclick="loadView('bearish')" id="btn-view-bearish" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">📉 TOP LOSERS</button>
            </div>

                    <button onclick="setCapFilter('LargeCap')" id="btn-cap-LargeCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">Large</button>
                    <button onclick="setCapFilter('MidCap')" id="btn-cap-MidCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">Mid</button>
                    <button onclick="setCapFilter('SmallCap')" id="btn-cap-SmallCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">Small</button>

                    <button onclick="setPriceFilter('100-250')" id="btn-price-100-250" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">100-250</button>
                    <button onclick="setPriceFilter('250-500')" id="btn-price-250-500" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">250-500</button>
                    <button onclick="setPriceFilter('500-1000')" id="btn-price-500-1000" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">500-1000</button>
                    <button onclick="setPriceFilter('GT1000')" id="btn-price-GT1000" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap">&gt;1000</button>
                </div>

                <!-- SORT -->
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-[13px] text-slate-400 font-bold uppercase shrink-0 font-mono">Sort:</span>
                    <select id="sort-select" onchange="setSort(this.value)" class="bg-slate-700 border border-slate-500 text-slate-50 text-[13px] font-mono font-bold rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-sky-700">
                        <option value="momentum">Momentum Score</option>
                        <option value="change">% Change</option>
                        <option value="volume">Volume</option>
                        <option value="price">Price</option>
                        <option value="rsi">RSI</option>
                        <option value="name">Company Name</option>
                    </select>
                    <button id="sort-dir-btn" onclick="toggleSortDir()" title="Toggle sort direction" class="px-2.5 py-1.5 rounded-lg text-sm font-mono font-bold bg-slate-700 text-slate-100 border border-slate-500 hover:border-slate-300">↓ High to Low</button>
                    <button onclick="resetFilters()" class="px-2.5 py-1.5 rounded-lg text-[13px] font-mono font-bold bg-slate-700 text-slate-300 border border-slate-500 hover:text-white whitespace-nowrap ml-auto">↺ Reset</button>
                </div>
            </div>
            <p id="cap-filter-note" class="hidden text-[13px] text-amber-500/80 font-mono">📎 Large/Mid/Small filtering needs one extra file (data/market-cap.csv) — ask your assistant how to add it.</p>
        </div>

        <div class="flex-1 overflow-y-auto bg-slate-800 border border-slate-600 rounded-xl p-4 shadow-xl">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3" id="stock-directory-list">
                </div>
        </div>
    </div>

    <div id="workspace-overlay" class="hidden fixed inset-0 bg-black/90 z-50 p-0 sm:p-4 backdrop-blur-md"></div>

    <script>
        // historicalData: { TICKER: [ {date, open, high, low, close, prevClose, volume}, ... ] } sorted oldest -> newest
        let historicalData = {};
        let stockNames = {};      // TICKER -> full company name (from FinInstrmNm)
        let marketCapMap = {};    // TICKER -> 'LargeCap' | 'MidCap' | 'SmallCap' (optional, from data/market-cap.csv)
        let fundamentalsMap = {}; // TICKER -> {pe, roe, de, eps} (optional, from data/fundamentals.csv)
        let stockData = {};       // TICKER -> latest snapshot + computed momentum indicators
        let availableDates = [];
        let marketIndexCloses = [];   // synthetic equal-weighted index level per date, built from our own tracked universe
        let marketBreadth = { date: null, advancers: 0, decliners: 0, unchanged: 0, avgChangePct: 0 };
        let marketROC10 = null;
        let currentChartTicker = null;
        let chartType = 'line';   // 'candle' | 'line'
        let showPivotPoints = false;
        let chartFullscreen = false;
        let activeTab = 'momentum';   // which preset tab is highlighted (null when a custom sort is chosen)
        let sortKey = 'momentum';     // momentum | change | volume | price | rsi | name
        let sortDir = 'desc';         // desc | asc
        let capFilter = 'ALL';
        let priceFilter = 'ALL';

        const TAB_PRESETS = {
            momentum: { key: 'momentum', dir: 'desc' },
            traded:   { key: 'volume',   dir: 'desc' },
            bullish:  { key: 'change',   dir: 'desc' },
            bearish:  { key: 'change',   dir: 'asc'  }
        };
        const DEFAULT_DIR = { momentum: 'desc', volume: 'desc', change: 'desc', price: 'desc', rsi: 'desc', name: 'asc' };

        window.addEventListener('DOMContentLoaded', () => {
            rotateQuote();
            quoteInterval = setInterval(rotateQuote, 3500);
            fetchLiveMarketData();
        });

        const MARKET_QUOTES = [
            { text: "The stock market is a device for transferring money from the impatient to the patient.", author: "Warren Buffett" },
            { text: "Know what you own, and know why you own it.", author: "Peter Lynch" },
            { text: "Time in the market beats timing the market.", author: "Common market wisdom" },
            { text: "Risk comes from not knowing what you are doing.", author: "Warren Buffett" },
            { text: "In investing, what is comfortable is rarely profitable.", author: "Robert Arnott" },
            { text: "The four most dangerous words in investing are: 'this time it's different.'", author: "Sir John Templeton" },
            { text: "Price is what you pay. Value is what you get.", author: "Warren Buffett" },
            { text: "The market can stay irrational longer than you can stay solvent.", author: "John Maynard Keynes" },
            { text: "Every stock you own should be a business you would be happy to own.", author: "Peter Lynch" },
            { text: "Discipline is the bridge between goals and results.", author: "Common market wisdom" }
        ];
        let quoteIndex = 0;
        let quoteInterval = null;

        function rotateQuote() {
            const q = MARKET_QUOTES[quoteIndex % MARKET_QUOTES.length];
            const qEl = document.getElementById('loading-quote');
            const aEl = document.getElementById('loading-attribution');
            if (!qEl) return;
            qEl.style.opacity = 0;
            setTimeout(() => {
                qEl.textContent = `"${q.text}"`;
                if (aEl) aEl.textContent = `— ${q.author}`;
                qEl.style.opacity = 1;
            }, 300);
            quoteIndex++;
        }

        function setStatus(text) {
            const a = document.getElementById('all-directory-count');
            const b = document.getElementById('loading-status');
            if (a) a.innerText = text;
            if (b) b.innerText = text;
        }

        function hideLoadingScreen() {
            if (quoteInterval) clearInterval(quoteInterval);
            const el = document.getElementById('loading-screen');
            if (!el) return;
            el.style.opacity = 0;
            setTimeout(() => el.classList.add('hidden'), 500);
        }

        // ---------------------------------------------------------
        // DATA LOADING
        // ---------------------------------------------------------
        async function fetchLiveMarketData() {
            try {
                setStatus('LOADING DATE INDEX...');

                const datesResp = await fetch('data/dates.json');
                if (!datesResp.ok) throw new Error("Could not find data/dates.json");
                availableDates = await datesResp.json();
                availableDates.sort();
                if (availableDates.length === 0) throw new Error("data/dates.json is empty");

                // Optional: market cap classification (Large/Mid/Small). Silently skipped if not present.
                try {
                    const capResp = await fetch('data/market-cap.csv');
                    if (capResp.ok) {
                        const capText = await capResp.text();
                        const parsedCap = Papa.parse(capText, { header: true, skipEmptyLines: true });
                        parsedCap.data.forEach(row => {
                            const sym = (row['Symbol'] || row['SYMBOL'] || '').trim().toUpperCase();
                            const cat = (row['Category'] || row['CATEGORY'] || '').trim();
                            if (sym && cat) marketCapMap[sym] = cat;
                        });
                    }
                } catch (e) { /* optional file - fine if missing */ }

                // Optional: manually-curated fundamentals (ROE, D/E, EPS, and optionally PE). Silently skipped if not present.
                try {
                    const fundResp = await fetch('data/fundamentals.csv');
                    if (fundResp.ok) {
                        const fundText = await fundResp.text();
                        const parsedFund = Papa.parse(fundText, { header: true, skipEmptyLines: true });
                        const num = (v) => (v !== undefined && v !== null && v !== '') ? parseFloat(v) : null;
                        parsedFund.data.forEach(row => {
                            const sym = (row['Symbol'] || '').trim().toUpperCase();
                            if (!sym) return;
                            fundamentalsMap[sym] = {
                                pe: num(row['PE']),       // optional - if absent, computed live from EPS + current price
                                roe: num(row['ROE']),
                                de: num(row['DebtToEquity']),
                                eps: num(row['EPS']),
                                bvps: num(row['BookValuePerShare']),
                                currentRatio: num(row['CurrentRatio']),
                                npm: num(row['NetProfitMargin'])
                            };
                        });
                    }
                } catch (e) { /* optional file - fine if missing */ }

                historicalData = {};
                stockNames = {};
                let completed = 0;
                const total = availableDates.length;

                const fetchPromises = availableDates.map(date =>
                    fetch(`data/bhavcopy/${date}.csv`)
                        .then(r => r.ok ? r.text() : null)
                        .catch(() => null)
                        .then(text => {
                            completed++;
                            setStatus(`LOADING HISTORICAL DATA... ${completed}/${total} SESSIONS`);
                            return { date, text };
                        })
                );

                const results = await Promise.all(fetchPromises);

                results.forEach(({ date, text }) => {
                    if (!text) return;
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

                    parsed.data.forEach(row => {
                        if (row['SctySrs'] !== 'EQ') return; // mainboard equity only

                        const ticker = row['TckrSymb'];
                        if (!ticker) return;

                        const close = parseFloat(row['ClsPric'] || 0);
                        const open = parseFloat(row['OpnPric'] || 0);
                        const high = parseFloat(row['HghPric'] || 0);
                        const low = parseFloat(row['LwPric'] || 0);
                        const prevClose = parseFloat(row['PrvsClsgPric'] || close);
                        const volume = parseFloat(row['TtlTradgVol'] || row['TOTTRDQTY'] || row['TotTrdQty'] || 0);

                        if (!close) return;

                        if (!historicalData[ticker]) historicalData[ticker] = [];
                        historicalData[ticker].push({ date, open, high, low, close, prevClose, volume });

                        if (row['FinInstrmNm']) stockNames[ticker] = row['FinInstrmNm'];
                    });
                });

                Object.keys(historicalData).forEach(t => {
                    historicalData[t].sort((a, b) => a.date.localeCompare(b.date));
                });

                buildMarketContext();
                buildMomentumSnapshot();
                renderMarketSentiment();

                if (Object.keys(marketCapMap).length === 0) {
                    ['LargeCap', 'MidCap', 'SmallCap'].forEach(c => {
                        const btn = document.getElementById(`btn-cap-${c}`);
                        if (btn) {
                            btn.disabled = true;
                            btn.title = 'Add data/market-cap.csv to enable this filter';
                            btn.classList.add('opacity-30', 'cursor-not-allowed');
                        }
                    });
                    document.getElementById('cap-filter-note').classList.remove('hidden');
                }

                loadView('momentum');
                setStatus(`SYSTEM READY: TRACKING ${Object.keys(stockData).length} EQUITIES ACROSS ${availableDates.length} SESSIONS`);
                hideLoadingScreen();

            } catch (e) {
                console.error("Data Load Failed:", e);
                setStatus(`DATA LOAD FAILED: ${e.message}`);
                hideLoadingScreen();
            }
        }

        // ---------------------------------------------------------
        // INDICATOR MATH
        // ---------------------------------------------------------
        function calcSMA(values, period) {
            if (values.length < period) return null;
            const slice = values.slice(-period);
            return slice.reduce((s, v) => s + v, 0) / period;
        }

        function calcRSI(closes, period = 14) {
            if (closes.length < period + 1) return null;
            let gains = 0, losses = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) gains += diff; else losses += Math.abs(diff);
            }
            const avgGain = gains / period, avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calcROC(closes, period) {
            if (closes.length < period + 1) return null;
            const past = closes[closes.length - 1 - period];
            const now = closes[closes.length - 1];
            if (!past) return null;
            return ((now - past) / past) * 100;
        }

        // Exponential moving average, full series (standard recursive EMA from the first value).
        function calcEMASeries(values, period) {
            const k = 2 / (period + 1);
            const out = [values[0]];
            for (let i = 1; i < values.length; i++) out.push(values[i] * k + out[i - 1] * (1 - k));
            return out;
        }

        // MACD (12, 26, 9) - standard trend/momentum indicator.
        function calcMACD(closes) {
            if (closes.length < 35) return null;
            const ema12 = calcEMASeries(closes, 12);
            const ema26 = calcEMASeries(closes, 26);
            const macdLine = closes.map((_, i) => ema12[i] - ema26[i]);
            const signalLine = calcEMASeries(macdLine, 9);
            const histogram = macdLine.map((v, i) => v - signalLine[i]);
            const n = closes.length;
            return { macd: macdLine[n - 1], signal: signalLine[n - 1], histogram: histogram[n - 1], prevHistogram: histogram[n - 2] };
        }

        // Bollinger Bands (20-day, 2 standard deviations) - measures where price sits within its recent volatility range.
        function calcBollinger(closes, period = 20, mult = 2) {
            if (closes.length < period) return null;
            const slice = closes.slice(-period);
            const mean = slice.reduce((a, b) => a + b, 0) / period;
            const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
            const stdev = Math.sqrt(variance);
            const upper = mean + mult * stdev, lower = mean - mult * stdev;
            const price = closes[closes.length - 1];
            const percentB = (upper - lower) !== 0 ? (price - lower) / (upper - lower) : 0.5;
            return { upper, lower, mean, percentB };
        }

        // ADX (14-day, Wilder's method, simplified) - measures how strong a trend is, not just its direction.
        function calcADX(hist, period = 14) {
            if (hist.length < period * 2) return null;
            const highs = hist.map(h => h.high), lows = hist.map(h => h.low), closes = hist.map(h => h.close);
            const trs = [], plusDM = [], minusDM = [];
            for (let i = 1; i < hist.length; i++) {
                const highDiff = highs[i] - highs[i - 1];
                const lowDiff = lows[i - 1] - lows[i];
                plusDM.push(highDiff > lowDiff && highDiff > 0 ? highDiff : 0);
                minusDM.push(lowDiff > highDiff && lowDiff > 0 ? lowDiff : 0);
                trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1])));
            }
            function wilderSmooth(arr) {
                const out = [];
                let sum = arr.slice(0, period).reduce((a, b) => a + b, 0);
                out[period - 1] = sum;
                for (let i = period; i < arr.length; i++) { sum = out[i - 1] - (out[i - 1] / period) + arr[i]; out[i] = sum; }
                return out;
            }
            const trSm = wilderSmooth(trs), plusDMSm = wilderSmooth(plusDM), minusDMSm = wilderSmooth(minusDM);
            const dx = [];
            let lastPlusDI = null, lastMinusDI = null;
            for (let i = period - 1; i < trs.length; i++) {
                if (!trSm[i]) continue;
                const pdi = 100 * plusDMSm[i] / trSm[i], mdi = 100 * minusDMSm[i] / trSm[i];
                lastPlusDI = pdi; lastMinusDI = mdi;
                dx[i] = (pdi + mdi) !== 0 ? 100 * Math.abs(pdi - mdi) / (pdi + mdi) : 0;
            }
            const dxValues = dx.filter(v => v !== undefined);
            if (dxValues.length < period) return null;
            const adx = dxValues.slice(-period).reduce((a, b) => a + b, 0) / period;
            return { adx, plusDI: lastPlusDI, minusDI: lastMinusDI };
        }

        // ---------------------------------------------------------
        // MARKET SENTIMENT CONTEXT
        // Built entirely from our own tracked universe of stocks -
        // no external index/benchmark feed required.
        // ---------------------------------------------------------
        function buildMarketContext() {
            // Fast lookup: ticker -> {date: close}
            const closeByDate = {};
            Object.keys(historicalData).forEach(ticker => {
                const map = {};
                historicalData[ticker].forEach(h => { map[h.date] = h.close; });
                closeByDate[ticker] = map;
            });

            // Equal-weighted daily return across every tracked stock, compounded into a synthetic index level
            const dailyAvgReturns = [];
            for (let i = 1; i < availableDates.length; i++) {
                const today = availableDates[i], yest = availableDates[i - 1];
                let sum = 0, count = 0;
                Object.keys(closeByDate).forEach(ticker => {
                    const c1 = closeByDate[ticker][yest], c2 = closeByDate[ticker][today];
                    if (c1 && c2) { sum += (c2 - c1) / c1; count++; }
                });
                dailyAvgReturns.push(count > 0 ? sum / count : 0);
            }

            marketIndexCloses = [100];
            dailyAvgReturns.forEach(r => marketIndexCloses.push(marketIndexCloses[marketIndexCloses.length - 1] * (1 + r)));
            marketROC10 = calcROC(marketIndexCloses, 10);

            // Today's market breadth (advancers vs decliners) across the whole tracked universe
            const latestDate = availableDates[availableDates.length - 1];
            const prevDate = availableDates[availableDates.length - 2];
            let advancers = 0, decliners = 0, unchanged = 0, changeSum = 0, changeCount = 0;
            if (prevDate) {
                Object.keys(closeByDate).forEach(ticker => {
                    const c1 = closeByDate[ticker][prevDate], c2 = closeByDate[ticker][latestDate];
                    if (c1 && c2) {
                        const pct = (c2 - c1) / c1 * 100;
                        if (pct > 0.05) advancers++; else if (pct < -0.05) decliners++; else unchanged++;
                        changeSum += pct; changeCount++;
                    }
                });
            }
            marketBreadth = { date: latestDate, advancers, decliners, unchanged, avgChangePct: changeCount > 0 ? changeSum / changeCount : 0 };
        }

        function renderMarketSentiment() {
            const el = document.getElementById('market-sentiment-badge');
            if (!el) return;
            const total = marketBreadth.advancers + marketBreadth.decliners + marketBreadth.unchanged;
            if (total === 0) { el.classList.add('hidden'); return; }
            const advPct = Math.round(marketBreadth.advancers / total * 100);
            let mood, colorClass;
            if (advPct >= 60) { mood = 'Bullish'; colorClass = 'text-emerald-400 border-emerald-800 bg-emerald-950'; }
            else if (advPct <= 40) { mood = 'Bearish'; colorClass = 'text-rose-400 border-rose-800 bg-rose-950'; }
            else { mood = 'Neutral'; colorClass = 'text-amber-400 border-amber-800 bg-amber-950'; }

            el.className = `flex items-center gap-2 px-3 py-2 rounded-xl font-mono text-sm border ${colorClass}`;
            el.innerHTML = `<span class="font-bold">${mood}</span><span class="text-[12px] opacity-80">${advPct}% advancing (${marketBreadth.advancers}↑ ${marketBreadth.decliners}↓)</span>`;
            el.classList.remove('hidden');
        }

        function computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price, volSurge, relStrength, macd, bollinger, adx }) {
            let score = 0;
            const breakdown = [];

            // Factor 1: 5-day price momentum - max 12 pts
            if (roc5 !== null) {
                const pts = Math.round(Math.max(0, Math.min(12, roc5 * 1.2)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: '5-Day Price Momentum',
                    value: `${roc5 >= 0 ? '+' : ''}${roc5.toFixed(1)}%`,
                    points: pts, max: 12,
                    note: roc5 > 3 ? 'Strong short-term push upward' : roc5 < -3 ? 'Recent pullback over the last week' : 'Little short-term movement either way'
                });
            } else {
                breakdown.push({ label: '5-Day Price Momentum', value: 'N/A', points: 0, max: 12, note: 'Not enough history yet (needs 5+ sessions)' });
            }

            // Factor 2: 10-day price momentum - max 8 pts, only rewards positive moves
            if (roc10 !== null) {
                const pts = Math.round(Math.max(0, Math.min(8, roc10 * 0.65)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: '10-Day Price Momentum',
                    value: `${roc10 >= 0 ? '+' : ''}${roc10.toFixed(1)}%`,
                    points: pts, max: 8,
                    note: roc10 > 0 ? 'Still climbing over a 2-week window' : 'No 2-week tailwind (only upward moves earn points here)'
                });
            } else {
                breakdown.push({ label: '10-Day Price Momentum', value: 'N/A', points: 0, max: 8, note: 'Not enough history yet (needs 10+ sessions)' });
            }

            // Factor 3: price vs 20-day average - max 10 pts
            if (sma20 !== null && price) {
                const above = price > sma20;
                const pts = above ? 10 : 0;
                score += pts;
                breakdown.push({
                    label: 'Price vs 20-Day Average',
                    value: `₹${price.toFixed(2)} vs ₹${sma20.toFixed(2)} avg`,
                    points: pts, max: 10,
                    note: above ? 'Trading above its 20-day average — an established short-term uptrend' : 'Trading below its 20-day average — no uptrend confirmation'
                });
            } else {
                breakdown.push({ label: 'Price vs 20-Day Average', value: 'N/A', points: 0, max: 10, note: 'Not enough history yet (needs 20+ sessions)' });
            }

            // Factor 4: is the 20-day average itself rising - max 8 pts
            if (sma20 !== null && sma20Prev !== null) {
                const rising = sma20 > sma20Prev;
                const pts = rising ? 8 : 0;
                score += pts;
                breakdown.push({
                    label: '20-Day Average Direction',
                    value: rising ? 'Rising' : 'Flat / falling',
                    points: pts, max: 8,
                    note: rising ? 'The trend itself is strengthening, not just a single-day spike' : 'The underlying trend is not yet confirmed as rising'
                });
            } else {
                breakdown.push({ label: '20-Day Average Direction', value: 'N/A', points: 0, max: 8, note: 'Not enough history yet (needs 25+ sessions)' });
            }

            // Factor 5: RSI(14) - max 12 pts, bell-curve shape peaking at 55-65.
            // This models the sine-wave pattern you rightly identified: RSI above 70 means
            // the stock is stretched/overbought and historically tends to revert, so those
            // readings should REDUCE the score, not reward it. We go negative below 30 and
            // above 80 to actively penalise the extremes within the overall 0-100 total.
            if (rsi14 !== null) {
                let pts, note;
                if (rsi14 >= 55 && rsi14 <= 65) {
                    pts = 12;
                    note = 'Sweet spot — healthy rising momentum with room still to run';
                } else if (rsi14 > 65 && rsi14 <= 70) {
                    pts = 9;
                    note = 'Strong momentum, approaching stretched territory';
                } else if (rsi14 > 70 && rsi14 <= 75) {
                    pts = 5;
                    note = 'Getting overbought — mean reversion risk is rising';
                } else if (rsi14 > 75 && rsi14 <= 80) {
                    pts = 0;
                    note = 'Overbought — historically this level precedes a pullback (sine-wave pattern)';
                } else if (rsi14 > 80) {
                    pts = -4;  // actively penalise extreme overbought
                    note = `Extremely overbought (RSI ${rsi14.toFixed(0)}) — high reversal risk, sine-wave top`;
                } else if (rsi14 >= 45 && rsi14 < 55) {
                    pts = 8;
                    note = 'Neutral-to-positive — momentum building but not confirmed yet';
                } else if (rsi14 >= 30 && rsi14 < 45) {
                    pts = 4;
                    note = 'Weak momentum — below the midpoint, no clear uptrend';
                } else if (rsi14 >= 25 && rsi14 < 30) {
                    pts = 0;
                    note = 'Oversold — watch for a bounce, but trend is still down';
                } else {
                    pts = -4;  // actively penalise extreme oversold too
                    note = `Extremely oversold (RSI ${rsi14.toFixed(0)}) — severe selling pressure`;
                }
                score += pts;
                breakdown.push({ label: 'RSI (14-day)', value: rsi14.toFixed(0), points: pts, max: 12, note });
            } else {
                breakdown.push({ label: 'RSI (14-day)', value: 'N/A', points: 0, max: 12, note: 'Not enough history yet (needs 15+ sessions)' });
            }

            // Factor 6: volume surge vs 20-day average - max 8 pts, tiered
            if (volSurge !== null) {
                let pts, note;
                if (volSurge > 1.5) { pts = 8; note = 'Unusually high volume — strong conviction behind the move'; }
                else if (volSurge > 1.2) { pts = 4; note = 'Somewhat elevated volume'; }
                else { pts = 0; note = 'Normal or below-average volume — less conviction behind the move'; }
                score += pts;
                breakdown.push({ label: 'Volume vs 20-Day Average', value: `${volSurge.toFixed(2)}x`, points: pts, max: 8, note });
            } else {
                breakdown.push({ label: 'Volume vs 20-Day Average', value: 'N/A', points: 0, max: 8, note: 'Not enough history yet' });
            }

            // Factor 7: Relative Strength vs overall market - max 14 pts
            // Rewards stocks outperforming the broader market, not just moving with it.
            // "Market" here is our own equal-weighted index built from every tracked stock.
            if (relStrength !== null) {
                const pts = Math.round(Math.max(0, Math.min(14, relStrength * 1.4)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: 'Relative Strength vs Market',
                    value: `${relStrength >= 0 ? '+' : ''}${relStrength.toFixed(1)}% vs market`,
                    points: pts, max: 14,
                    note: relStrength > 3 ? 'Meaningfully beating the broader market — real outperformance, not just a rising tide' : relStrength < -3 ? 'Lagging the broader market over this period' : 'Moving roughly in line with the overall market'
                });
            } else {
                breakdown.push({ label: 'Relative Strength vs Market', value: 'N/A', points: 0, max: 14, note: 'Not enough market-wide history yet' });
            }

            // Factor 8 (NEW): MACD (12,26,9) - max 12 pts
            // Standard trend/momentum indicator - rewards a bullish crossover with strengthening momentum.
            if (macd !== null) {
                let pts, note;
                const bullish = macd.macd > macd.signal;
                const strengthening = macd.prevHistogram !== undefined && macd.histogram > macd.prevHistogram;
                if (bullish && macd.histogram > 0 && strengthening) { pts = 12; note = 'Bullish crossover with strengthening momentum'; }
                else if (bullish) { pts = 7; note = 'Bullish (MACD line above its signal line)'; }
                else { pts = 0; note = 'Bearish (MACD line below its signal line)'; }
                score += pts;
                breakdown.push({ label: 'MACD (12,26,9)', value: `${macd.macd.toFixed(2)} vs ${macd.signal.toFixed(2)}`, points: pts, max: 12, note });
            } else {
                breakdown.push({ label: 'MACD (12,26,9)', value: 'N/A', points: 0, max: 12, note: 'Not enough history yet (needs 35+ sessions)' });
            }

            // Factor 9 (NEW): Bollinger Bands position - max 8 pts
            // Measures where price sits within its recent volatility range - upper-half-but-not-extended is the sweet spot.
            if (bollinger !== null) {
                let pts, note;
                const pb = bollinger.percentB;
                if (pb >= 0.5 && pb <= 0.95) { pts = 8; note = 'Trading in the upper half of its recent range — healthy strength'; }
                else if (pb > 0.95) { pts = 3; note = 'At/above its upper band — extended, watch for a pullback'; }
                else if (pb >= 0.2 && pb < 0.5) { pts = 4; note = 'Lower half of its recent range — lacks strength'; }
                else { pts = 0; note = 'Near/below its lower band — weak, breaking down'; }
                score += pts;
                breakdown.push({ label: 'Bollinger Band Position', value: `${Math.round(pb * 100)}% of band range`, points: pts, max: 8, note });
            } else {
                breakdown.push({ label: 'Bollinger Band Position', value: 'N/A', points: 0, max: 8, note: 'Not enough history yet (needs 20+ sessions)' });
            }

            // Factor 10 (NEW): ADX trend strength - max 8 pts
            // Distinguishes a genuine strong trend from directionless chop, and confirms which direction is winning.
            if (adx !== null) {
                let pts, note;
                if (adx.adx > 25 && adx.plusDI > adx.minusDI) { pts = 8; note = `Strong uptrend confirmed (ADX ${adx.adx.toFixed(0)}, buyers in control)`; }
                else if (adx.adx > 25 && adx.minusDI > adx.plusDI) { pts = 0; note = `Strong downtrend (ADX ${adx.adx.toFixed(0)}, sellers in control)`; }
                else { pts = 3; note = `Weak or no clear trend (ADX ${adx.adx.toFixed(0)}) — choppy conditions`; }
                score += pts;
                breakdown.push({ label: 'ADX Trend Strength', value: adx.adx.toFixed(1), points: pts, max: 8, note });
            } else {
                breakdown.push({ label: 'ADX Trend Strength', value: 'N/A', points: 0, max: 8, note: 'Not enough history yet (needs 28+ sessions)' });
            }

            score = Math.max(0, Math.min(100, Math.round(score)));
            return { score, breakdown };
        }

        function getVerdict(score) {
            if (score >= 65) return { label: 'BUY', text: 'text-emerald-400', badge: 'bg-emerald-950 text-emerald-400 border-emerald-800' };
            if (score >= 40) return { label: 'HOLD', text: 'text-amber-400', badge: 'bg-amber-950 text-amber-400 border-amber-800' };
            return { label: 'AVOID', text: 'text-rose-400', badge: 'bg-rose-950 text-rose-400 border-rose-800' };
        }

        function buildMomentumSnapshot() {
            stockData = {};
            Object.keys(historicalData).forEach(ticker => {
                const hist = historicalData[ticker];
                if (hist.length < 2) return;

                const closes = hist.map(h => h.close);
                const volumes = hist.map(h => h.volume);
                const latest = hist[hist.length - 1];
                const prev = hist[hist.length - 2];

                const change = prev.close > 0 ? ((latest.close - prev.close) / prev.close) * 100 : 0;
                const roc5 = calcROC(closes, 5);
                const roc10 = calcROC(closes, 10);
                const roc20 = calcROC(closes, 20);
                const sma20 = calcSMA(closes, 20);
                const sma20Prev = closes.length >= 25 ? calcSMA(closes.slice(0, -5), 20) : null;
                const rsi14 = calcRSI(closes, 14);
                const avgVol20 = calcSMA(volumes.slice(0, -1), Math.min(20, volumes.length - 1)) || null;
                const volSurge = avgVol20 && avgVol20 > 0 ? latest.volume / avgVol20 : null;
                const relStrength = (roc10 !== null && marketROC10 !== null) ? (roc10 - marketROC10) : null;
                const macd = calcMACD(closes);
                const bollinger = calcBollinger(closes);
                const adx = calcADX(hist);

                const { score, breakdown } = computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price: latest.close, volSurge, relStrength, macd, bollinger, adx });

                stockData[ticker] = {
                    symbol: ticker,
                    name: stockNames[ticker] || ticker,
                    price: latest.close,
                    dayHigh: latest.high,
                    dayLow: latest.low,
                    volume: latest.volume,
                    change,
                    roc5, roc10, roc20, rsi14, sma20, volSurge, relStrength, macd, bollinger, adx,
                    momentumScore: score,
                    breakdown,
                    capCategory: marketCapMap[ticker] || null,
                    sessionsTracked: hist.length
                };
            });
        }

        // FILTER + SORT STATE

        window.setCapFilter = function(val) {
            capFilter = val;
            ['ALL', 'LargeCap', 'MidCap', 'SmallCap'].forEach(c => {
                const btn = document.getElementById(`btn-cap-${c}`);
                if (!btn || btn.disabled) return;
                btn.className = c === val
                    ? "px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-600 text-slate-50 border border-slate-400 whitespace-nowrap"
                    : "px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap";
            });
            renderList();
        };

        window.setPriceFilter = function(val) {
            priceFilter = val;
            ['ALL', 'LT100', '100-250', '250-500', '500-1000', 'GT1000'].forEach(p => {
                const btn = document.getElementById(`btn-price-${p}`);
                if (!btn) return;
                btn.className = p === val
                    ? "px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-600 text-slate-50 border border-slate-400 whitespace-nowrap"
                    : "px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap";
            });
            renderList();
        };

        // Tab buttons are just convenient presets for the sort control
        window.loadView = function(tab) {
            activeTab = tab;
            const preset = TAB_PRESETS[tab];
            sortKey = preset.key;
            sortDir = preset.dir;
            syncSortControlsUI();
            renderList();
        };

        // Manual sort dropdown - overrides tab presets
        window.setSort = function(key) {
            sortKey = key;
            sortDir = DEFAULT_DIR[key] || 'desc';
            activeTab = null;
            syncSortControlsUI();
            renderList();
        };

        window.toggleSortDir = function() {
            sortDir = sortDir === 'desc' ? 'asc' : 'desc';
            syncSortControlsUI();
            renderList();
        };

        window.resetFilters = function() {
            document.getElementById('search-input').value = '';
            capFilter = 'ALL'; priceFilter = 'ALL';
            setCapFilter('ALL'); setPriceFilter('ALL');
            loadView('momentum');
        };

        function syncSortControlsUI() {
            document.getElementById('sort-select').value = sortKey;
            const dirBtn = document.getElementById('sort-dir-btn');
            const labels = {
                momentum: ['High to Low', 'Low to High'], change: ['High to Low', 'Low to High'],
                volume: ['High to Low', 'Low to High'], price: ['High to Low', 'Low to High'],
                rsi: ['High to Low', 'Low to High'], name: ['A to Z', 'Z to A']
            };
            const [descLabel, ascLabel] = labels[sortKey] || ['High to Low', 'Low to High'];
            dirBtn.textContent = sortDir === 'desc' ? `↓ ${descLabel}` : `↑ ${ascLabel}`;

            const allTabs = ['momentum', 'traded', 'bullish', 'bearish'];
            allTabs.forEach(v => {
                const btn = document.getElementById(`btn-view-${v}`);
                if (btn) {
                    btn.className = (activeTab === v)
                        ? "px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-600 text-slate-50 border border-slate-400 whitespace-nowrap"
                        : "px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-slate-700 text-slate-300 border border-transparent hover:text-white whitespace-nowrap";
                }
            });
        }

        function getSortValue(ticker, key) {
            const d = stockData[ticker];
            switch (key) {
                case 'momentum': return d.momentumScore;
                case 'volume': return d.volume;
                case 'change': return d.change;
                case 'price': return d.price;
                case 'rsi': return d.rsi14 === null ? -Infinity : d.rsi14;
                case 'name': return d.name || '';
                default: return 0;
            }
        }

        function matchesPriceFilter(price) {
            switch (priceFilter) {
                case 'LT100': return price < 100;
                case '100-250': return price >= 100 && price < 250;
                case '250-500': return price >= 250 && price < 500;
                case '500-1000': return price >= 500 && price < 1000;
                case 'GT1000': return price >= 1000;
                default: return true;
            }
        }

        // ---------------------------------------------------------
        // RENDERING
        // ---------------------------------------------------------
        function renderList() {
            const searchVal = document.getElementById('search-input').value.toUpperCase().trim();
            const container = document.getElementById('stock-directory-list');
            container.innerHTML = '';

            let keys = Object.keys(stockData);

            if (capFilter !== 'ALL') keys = keys.filter(k => stockData[k].capCategory === capFilter);
            if (priceFilter !== 'ALL') keys = keys.filter(k => matchesPriceFilter(stockData[k].price));
            if (searchVal) keys = keys.filter(k => k.includes(searchVal) || (stockData[k].name || '').toUpperCase().includes(searchVal));

            keys.sort((a, b) => {
                const va = getSortValue(a, sortKey), vb = getSortValue(b, sortKey);
                const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
                return sortDir === 'desc' ? -cmp : cmp;
            });

            if (keys.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center font-mono text-base text-slate-500 py-10">No stocks match your filters</div>`;
                return;
            }

            keys.slice(0, 60).forEach((ticker, index) => {
                const data = stockData[ticker];
                const changeColor = data.change >= 0 ? "text-emerald-500" : "text-rose-500";
                const changeSign = data.change >= 0 ? "+" : "";
                const verdict = getVerdict(data.momentumScore);

                let volDisplay = data.volume > 1000000 ? (data.volume / 1000000).toFixed(1) + 'M Vol' : (data.volume / 1000).toFixed(0) + 'K Vol';
                if (data.volume === 0) volDisplay = '';

                const div = document.createElement('div');
                div.className = `p-4 bg-slate-700/40 border border-slate-500/80 rounded-xl hover:border-slate-300 cursor-pointer transition-all flex flex-col justify-between shadow-sm hover:shadow-md group relative`;
                div.onclick = () => openWorkspace(ticker);

                let rankBadge = (!searchVal) ? `<span class="absolute -top-2 -left-2 bg-slate-600 text-slate-200 text-[12px] px-1.5 py-0.5 rounded border border-slate-400 font-bold">#${index + 1}</span>` : '';

                div.innerHTML = `
                    ${rankBadge}
                    <div class="flex justify-between items-start font-mono mb-3 gap-2">
                        <div class="min-w-0">
                            <div class="text-lg font-bold text-white group-hover:text-sky-400 transition-colors truncate" title="${data.name}">${data.name}</div>
                            <div class="text-base text-slate-300 font-bold tracking-wide">${ticker}</div>
                            <div class="text-[13px] font-bold mt-1.5 inline-block px-1.5 py-0.5 rounded border ${verdict.badge}">${verdict.label} · ${data.momentumScore}</div>
                        </div>
                        <div class="text-sm ${changeColor} font-bold bg-slate-800 px-2 py-1 rounded border border-slate-500 shrink-0">
                            ${changeSign}${data.change.toFixed(2)}%
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-end font-mono">
                             <div class="text-[12px] text-slate-300 tracking-wider">${volDisplay}</div>
                             <div class="text-lg font-bold text-white">₹${data.price.toLocaleString('en-IN', {minimumFractionDigits: 2})}</div>
                        </div>
                        <div class="text-[12px] text-slate-400 font-mono">H ₹${data.dayHigh.toFixed(2)} &nbsp;·&nbsp; L ₹${data.dayLow.toFixed(2)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Expands the chart to fill the workspace, using the browser's real Fullscreen API

        window.toggleChartFullscreen = async function() {
            const wrapper = document.getElementById('chart-wrapper');
            const infoPanel = document.getElementById('info-panel');
            const btn = document.getElementById('btn-chart-fullscreen');

            if (!document.fullscreenElement) {
                try {
                    if (wrapper.requestFullscreen) {
                        await wrapper.requestFullscreen();
                    }
                } catch (e) { /* Fullscreen API not available/denied - continue with CSS-only expand below */ }

                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } catch (e) { /* orientation lock not supported on this device/browser (e.g. iOS) */ }

                chartFullscreen = true;
                wrapper.classList.remove('h-[240px]');
                wrapper.classList.add('h-[100vh]', 'bg-slate-900', 'z-50');
                infoPanel.classList.add('hidden');
                btn.textContent = '⤢ Collapse';
                setTimeout(() => { if (currentChartTicker) renderPriceChart(currentChartTicker); }, 250);
            } else {
                document.exitFullscreen();

        };

        // Keeps the UI in sync if the user exits fullscreen via Esc, back gesture, or swipe -

        document.addEventListener('fullscreenchange', () => {

                const infoPanel = document.getElementById('info-panel');

        // Classic daily pivot points, calculated from the most recent session's High/Low/Close.
        // These are the standard support/resistance levels short-term traders watch.
        function calcPivotPoints(latest) {
            const { high, low, close } = latest;
            const p = (high + low + close) / 3;
            return {
                p,
                r1: 2 * p - low, r2: p + (high - low), r3: high + 2 * (p - low),
                s1: 2 * p - high, s2: p - (high - low), s3: low - 2 * (high - p)
            };
        }

        // Draws a chart using our own NSE bhavcopy history (not TradingView's live feed).
        // This is the free, open-source "Lightweight Charts" library from TradingView -
        // it just draws whatever data we give it, no exchange/license restrictions.
        function renderPriceChart(ticker) {
            const container = document.getElementById('own-chart-container');
            if (!container) return;
            container.innerHTML = '';
            const hist = historicalData[ticker] || [];
            if (hist.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400 text-sm font-mono">No price history available for this stock</div>';
                return;

            const chart = LightweightCharts.createChart(container, {
                layout: { background: { color: 'transparent' }, textColor: '#cbd5e1' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                timeScale: { borderColor: '#475569' },
                rightPriceScale: { borderColor: '#475569' },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                autoSize: true
            });

            let mainSeries;
            if (chartType === 'line') {
                const lineData = hist.map(h => ({ time: h.date, value: h.close }));

                mainSeries.setData(lineData);
            } else {
                const candleData = hist.map(h => ({ time: h.date, open: h.open, high: h.high, low: h.low, close: h.close }));
                mainSeries = chart.addCandlestickSeries({
                    upColor: '#10b981', downColor: '#f43f5e', borderVisible: false,
                    wickUpColor: '#10b981', wickDownColor: '#f43f5e'
                });
                mainSeries.setData(candleData);
            }

            const volumeData = hist.map(h => ({
                time: h.date,
                value: h.volume,
                color: h.close >= h.open ? 'rgba(16,185,129,0.5)' : 'rgba(244,63,94,0.5)'

            const volumeSeries = chart.addHistogramSeries({
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 }
            });

            if (showPivotPoints) {
                const latest = hist[hist.length - 1];
                const pv = calcPivotPoints(latest);
                const lines = [
                    { value: pv.r3, color: '#f43f5e', title: 'R3' },
                    { value: pv.r2, color: '#fb923c', title: 'R2' },
                    { value: pv.r1, color: '#fbbf24', title: 'R1' },
                    { value: pv.p, color: '#38bdf8', title: 'Pivot' },
                    { value: pv.s1, color: '#fbbf24', title: 'S1' },
                    { value: pv.s2, color: '#fb923c', title: 'S2' },
                    { value: pv.s3, color: '#f43f5e', title: 'S3' }
                ];
                lines.forEach(l => {
                    mainSeries.createPriceLine({
                        price: l.value, color: l.color, lineWidth: 1,

        // Draws a small inline SVG line chart for a factor's recent history.
        function renderSparkline(values, zeroLine) {
            if (!values || values.length < 2) return '<div class="text-[11px] text-slate-400">Not enough recent history to show a trend yet.</div>';
            const w = 300, h = 56, pad = 6;
            const min = Math.min(...values, zeroLine ? 0 : Infinity);
            const max = Math.max(...values, zeroLine ? 0 : -Infinity);
            const range = (max - min) || 1;
            const stepX = values.length > 1 ? (w - pad * 2) / (values.length - 1) : 0;
            const toY = v => h - pad - ((v - min) / range) * (h - pad * 2);
            const points = values.map((v, i) => `${(pad + i * stepX).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
            const lastX = pad + (values.length - 1) * stepX, lastY = toY(values[values.length - 1]);
            const up = values[values.length - 1] >= values[0];
            const color = up ? '#34d399' : '#fb7185';
            let zeroLineSvg = '';
            if (zeroLine && min < 0 && max > 0) {
                zeroLineSvg = `<line x1="${pad}" y1="${toY(0)}" x2="${w - pad}" y2="${toY(0)}" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>`;
            }
            return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-14">
                ${zeroLineSvg}
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
                <circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>
            </svg>`;
        }

        // Computes a trailing series + explanation for whichever factor the user expands.
        // Reuses the same point-in-time indicator functions already used for scoring, just
        // called repeatedly over a recent window - only done on-demand for the one open stock.
        function getFactorDetail(label, ticker) {
            const hist = historicalData[ticker];
            if (!hist) return { series: [], detail: '' };
            const closes = hist.map(h => h.close);
            const dates = hist.map(h => h.date);
            const n = closes.length;
            const win = Math.min(25, n);

            switch (label) {
                case '5-Day Price Momentum': {
                    const series = [];
                    for (let i = Math.max(5, n - win); i <= n - 1; i++) { const v = calcROC(closes.slice(0, i + 1), 5); if (v !== null) series.push(v); }
                    const ago = closes[n - 6];
                    return { series, zeroLine: true, detail: ago !== undefined ? `${dates[n - 6]}: ₹${ago.toFixed(2)} → ${dates[n - 1]}: ₹${closes[n - 1].toFixed(2)}. Chart shows the 5-day % change trend over recent sessions.` : 'Not enough history yet.' };
                }
                case '10-Day Price Momentum': {
                    const series = [];
                    for (let i = Math.max(10, n - win); i <= n - 1; i++) { const v = calcROC(closes.slice(0, i + 1), 10); if (v !== null) series.push(v); }
                    const ago = closes[n - 11];
                    return { series, zeroLine: true, detail: ago !== undefined ? `${dates[n - 11]}: ₹${ago.toFixed(2)} → ${dates[n - 1]}: ₹${closes[n - 1].toFixed(2)}. Chart shows the 10-day % change trend over recent sessions.` : 'Not enough history yet.' };
                }
                case 'Price vs 20-Day Average': {
                    const series = [];
                    for (let i = Math.max(20, n - win); i <= n - 1; i++) { const sma = calcSMA(closes.slice(0, i + 1), 20); if (sma !== null) series.push(closes[i] - sma); }
                    return { series, zeroLine: true, detail: 'Price minus its 20-day average, each session. Above zero = above the average; crossing zero is a trend change.' };
                }
                case '20-Day Average Direction': {
                    const series = [];
                    for (let i = Math.max(20, n - win); i <= n - 1; i++) { const sma = calcSMA(closes.slice(0, i + 1), 20); if (sma !== null) series.push(sma); }
                    return { series, detail: 'The 20-day average\'s own value over recent sessions - an upward slope confirms a strengthening trend.' };
                }
                case 'RSI (14-day)': {
                    const series = [];
                    for (let i = Math.max(15, n - win); i <= n - 1; i++) { const v = calcRSI(closes.slice(0, i + 1), 14); if (v !== null) series.push(v); }
                    return { series, detail: `RSI over recent sessions. The scoring peaks at 55-65 (healthy rising momentum), then tapers off as RSI climbs toward 70 and actively penalises readings above 80 (overbought extremes). This reflects the sine-wave pattern you identified: overbought RSI readings tend to revert. Oversold (<25) is also penalised since it signals strong selling pressure, not a buying opportunity in a momentum screener. Current RSI: ${rsi14 !== null ? rsi14.toFixed(1) : 'N/A'}.` };
                }
                case 'Volume vs 20-Day Average': {
                    const volumes = hist.map(h => h.volume).slice(-win);
                    return { series: volumes, detail: 'Raw daily traded volume over recent sessions (not the ratio - this shows the actual activity level).' };
                }
                case 'Relative Strength vs Market': {
                    const series = [];
                    for (let i = Math.max(10, n - win); i <= n - 1; i++) {
                        const stockRoc = calcROC(closes.slice(0, i + 1), 10);
                        const marketRoc = calcROC(marketIndexCloses.slice(0, i + 1), 10);
                        if (stockRoc !== null && marketRoc !== null) series.push(stockRoc - marketRoc);
                    }
                    return { series, zeroLine: true, detail: 'This stock\'s 10-day return minus the market\'s 10-day return, each session. Above zero = beating the market.' };
                }
                case 'MACD (12,26,9)': {
                    const series = [];
                    for (let i = Math.max(35, n - win); i <= n - 1; i++) { const m = calcMACD(closes.slice(0, i + 1)); if (m) series.push(m.histogram); }
                    return { series, zeroLine: true, detail: 'MACD histogram (MACD line minus its signal line) over recent sessions. Positive and rising is the strongest bullish signal.' };
                }
                case 'Bollinger Band Position': {
                    const series = [];
                    for (let i = Math.max(20, n - win); i <= n - 1; i++) { const bb = calcBollinger(closes.slice(0, i + 1)); if (bb) series.push(bb.percentB * 100); }
                    return { series, detail: '% position within the Bollinger Band range over recent sessions (0% = lower band, 100% = upper band).' };
                }
                case 'ADX Trend Strength': {
                    const series = [];
                    for (let i = Math.max(28, n - win); i <= n - 1; i++) { const a = calcADX(hist.slice(0, i + 1)); if (a) series.push(a.adx); }
                    return { series, detail: 'ADX over recent sessions. Above 25 = a genuinely strong trend; below 20 = choppy, directionless conditions.' };
                }
                default:
                    return { series: [], detail: '' };
            }
        }

        window.toggleFactorDetail = function(index) {
            const panel = document.getElementById(`factor-detail-${index}`);
            const arrow = document.getElementById(`factor-arrow-${index}`);
            if (!panel) return;
            const isHidden = panel.classList.contains('hidden');

            if (isHidden && panel.dataset.loaded !== 'true') {
                const label = panel.dataset.label;
                const d = getFactorDetail(label, currentChartTicker);
                panel.innerHTML = `
                    <div class="mt-2 bg-slate-900/60 rounded-lg p-3 border border-slate-600">
                        ${renderSparkline(d.series, d.zeroLine)}
                        <div class="text-[11px] text-slate-300 mt-2">${d.detail}</div>
                    </div>
                `;
                panel.dataset.loaded = 'true';
            }
            panel.classList.toggle('hidden');
            if (arrow) arrow.textContent = isHidden ? '▴' : '▾';
        };

        window.closeWorkspace = function() {
            if (document.fullscreenElement) document.exitFullscreen();
            const overlay = document.getElementById('workspace-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex', 'items-center', 'justify-center');
            overlay.innerHTML = '';
        };

        window.toggleWorkspaceTab = function(activeTab, ticker) {
            const tabs = ['momentum', 'decoder', 'fundamentals', 'news'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`btn-tab-${tab}`);
                const panel = document.getElementById(`panel-tab-${tab}`);
                if (tab === activeTab) {
                    btn.className = btn.className.replace('border-transparent', 'border-sky-500').replace('text-slate-300', 'text-sky-400');
                    panel.classList.remove('hidden'); panel.classList.add('flex');
                } else {
                    btn.className = btn.className.replace('border-sky-500', 'border-transparent').replace('text-sky-400', 'text-slate-300');
                    panel.classList.add('hidden'); panel.classList.remove('flex');
                }
            });

            if (activeTab === 'decoder') {
                const container = document.getElementById('tv-decoder-container');
                if (container && container.innerHTML.trim() === '') {
                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js'; script.async = true;
                    script.text = JSON.stringify({ "interval": "1D", "width": "100%", "isTransparent": true, "height": "100%", "symbol": `BSE:${ticker}`, "showIntervalTabs": true, "displayMode": "single", "locale": "en", "colorTheme": "dark" });
                    container.appendChild(script);
                }
            }
            
            if (activeTab === 'news') {
                const container = document.getElementById('tv-news-container');
                if (container && container.innerHTML.trim() === '') {
                    container.innerHTML = `<div class="p-6 text-center text-slate-300 text-sm font-mono animate-pulse">📡 Scanning dynamic news matrix for ${ticker}...</div>`;
                    fetchLiveNews(ticker, container);
                }
            }
        };

        // Tries several free CORS proxies in sequence, since any single free service
        // can go down or rate-limit with no warning (confirmed: AllOrigins had an outage
        // on their end on 2026-07-16). More options = better odds one is up right now.
        const NEWS_CORS_PROXIES = [
            (url) => `https://corsfix.com/${url}`,
            (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
            (url) => `https://cors.x2u.in/${url}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];

        async function fetchWithTimeout(url, ms) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), ms);
            try {
                return await fetch(url, { signal: controller.signal });
            } finally {
                clearTimeout(timer);
            }
        }

        // Escapes text before it's ever inserted into the page - defends against a malicious
        // actor crafting a news title containing HTML/script that could otherwise run in the browser.
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str == null ? '' : String(str);
            return div.innerHTML;
        }

        function renderNewsCards(items) {
            let html = '<div class="p-3 flex flex-col gap-3 pb-8">';
            items.forEach(item => {
                const title = escapeHtml(item.title || 'Untitled');
                const link = escapeHtml(item.link || '#');
                const source = escapeHtml(item.source || 'Market Update');
                const pubDate = item.pubDate ? new Date(item.pubDate) : null;
                const dateString = pubDate && !isNaN(pubDate) ? pubDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '';

                html += `
                    <a href="${link}" target="_blank" rel="noopener noreferrer" class="block bg-slate-700/60 hover:bg-slate-500/90 border border-slate-500/80 p-3.5 rounded-xl transition-all duration-200 group shadow-md">
                        <h4 class="text-sm font-semibold text-slate-50 group-hover:text-sky-400 mb-2 leading-relaxed">${title}</h4>
                        <div class="flex justify-between items-center mt-2 border-t border-slate-500/40 pt-2 font-mono text-[12px] text-slate-300">
                            <span class="uppercase tracking-wider font-bold">${source}</span>
                            <span>${dateString}</span>
                        </div>
                    </a>
                `;
            });
            html += '</div>';
            return html;
        }

        let newsCache = null; // loaded once, from the scheduled Action's output (data/news.json)

        async function fetchLiveNews(ticker, container) {
            // 1. Try the pre-fetched cache first (built server-side by a scheduled GitHub Action -
            //    no CORS issues, no live proxy dependency, and covers the Large/Mid cap universe).
            try {
                if (newsCache === null) {
                    const resp = await fetch('data/news.json');
                    newsCache = resp.ok ? await resp.json() : { news: {} };
                }
                const cached = newsCache.news && newsCache.news[ticker];
                if (cached && cached.length > 0) {
                    container.innerHTML = renderNewsCards(cached);
                    const updatedNote = document.createElement('div');
                    updatedNote.className = 'text-center text-[10px] text-slate-400 font-mono pb-3';
                    updatedNote.textContent = newsCache.updatedAt ? `Cached · updated ${new Date(newsCache.updatedAt).toLocaleString('en-IN')}` : 'Cached';
                    container.appendChild(updatedNote);
                    return;
                }
            } catch (e) { /* cache missing or unreadable - fall through to live fetch below */ }

            // 2. Fall back to a live fetch (e.g. for small-cap stocks not in the cached set)
            const query = encodeURIComponent(`${ticker} stock India news`);
            const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=en-IN&gl=IN&ceid=IN:en`;

            let xmlText = null;
            for (const buildProxyUrl of NEWS_CORS_PROXIES) {
                try {
                    const resp = await fetchWithTimeout(buildProxyUrl(rssUrl), 6000);
                    if (!resp.ok) continue;
                    const text = await resp.text();
                    if (text && text.includes('<item>')) { xmlText = text; break; }
                } catch (e) { /* timed out or failed - try the next proxy */ }
            }

            if (!xmlText) {
                container.innerHTML = '<div class="p-6 text-center text-rose-400 text-sm font-mono">⚠️ Could not load news right now (feed service unavailable). Try again in a bit.</div>';
                return;
            }

            try {
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, 'text/xml');
                const items = Array.from(xml.querySelectorAll('item')).slice(0, 10).map(item => ({
                    title: item.querySelector('title')?.textContent || 'Untitled',
                    link: item.querySelector('link')?.textContent || '#',
                    pubDate: item.querySelector('pubDate')?.textContent || null,
                    source: item.querySelector('source')?.textContent || 'Market Update'
                }));

                if (items.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-slate-300 text-sm font-mono">No localized stock news tiles available.</div>';
                    return;
                }
                container.innerHTML = renderNewsCards(items);
            } catch (error) {
                container.innerHTML = '<div class="p-6 text-center text-rose-400 text-sm font-mono">⚠️ Error parsing the news feed.</div>';
            }
        }
    </script>
