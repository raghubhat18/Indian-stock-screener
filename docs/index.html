<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBK Dynamic Market Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript" src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { font-family: Arial, Helvetica, sans-serif !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans min-h-screen flex flex-col selection:bg-zinc-800 selection:text-zinc-200">

    <div id="loading-screen" class="fixed inset-0 z-[70] bg-black flex flex-col items-center justify-center p-6 text-center transition-opacity duration-500">
        <div class="text-4xl mb-8">📈</div>
        <div id="loading-quote" class="text-zinc-200 text-xl sm:text-2xl font-medium max-w-lg mb-3 leading-relaxed transition-opacity duration-300">Loading...</div>
        <div id="loading-attribution" class="text-zinc-600 text-base mb-10"></div>
        <div class="w-9 h-9 border-2 border-zinc-700 border-t-sky-500 rounded-full animate-spin mb-6"></div>
        <div id="loading-status" class="text-zinc-500 text-base font-mono">INITIALIZING DATA ENGINE...</div>
    </div>

    <div class="flex-1 flex flex-col max-w-[1300px] w-full mx-auto p-4 md:p-6 space-y-4 overflow-hidden">

        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-3 border-b border-zinc-800 gap-3 shrink-0">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-zinc-100 flex items-center gap-2">
                    <span>📈</span> RBK DYNAMIC MARKET SCREENER
                </h1>
                <p class="text-base text-zinc-500 mt-1 font-mono" id="all-directory-count">INITIALIZING DATA ENGINE...</p>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
                <div id="market-sentiment-badge" class="hidden"></div>
                <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-xl font-mono text-sm text-zinc-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span>DATA SYNCED</span>
                </div>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="shrink-0">
            <input type="text" id="search-input" oninput="renderList()" placeholder="🔍 Search by symbol or company name..."
                   class="w-full bg-zinc-900 border border-zinc-800 text-base rounded-xl px-4 py-3.5 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-sky-700 font-mono transition-colors">
        </div>

        <!-- VIEW TABS -->
        <div class="flex flex-col gap-3 shrink-0 bg-zinc-950 p-3 rounded-xl border border-zinc-900">
            <div class="flex flex-wrap items-center gap-2 w-full">
                <button onclick="loadView('momentum')" id="btn-view-momentum" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">🚀 MOMENTUM</button>
                <button onclick="loadView('traded')" id="btn-view-traded" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">🔥 MOST TRADED</button>
                <button onclick="loadView('bullish')" id="btn-view-bullish" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">📈 TOP GAINERS</button>
                <button onclick="loadView('bearish')" id="btn-view-bearish" class="px-3 sm:px-4 py-2.5 rounded-lg text-sm sm:text-base font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">📉 TOP LOSERS</button>
            </div>

            <div class="flex flex-col gap-3 border-t border-zinc-900 pt-3">
                <!-- CAP FILTER -->
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-[13px] text-zinc-600 font-bold uppercase shrink-0 font-mono">Cap:</span>
                    <button onclick="setCapFilter('ALL')" id="btn-cap-ALL" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">All</button>
                    <button onclick="setCapFilter('LargeCap')" id="btn-cap-LargeCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Large</button>
                    <button onclick="setCapFilter('MidCap')" id="btn-cap-MidCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Mid</button>
                    <button onclick="setCapFilter('SmallCap')" id="btn-cap-SmallCap" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Small</button>
                </div>

                <!-- PRICE FILTER -->
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-[13px] text-zinc-600 font-bold uppercase shrink-0 font-mono">Price:</span>
                    <button onclick="setPriceFilter('ALL')" id="btn-price-ALL" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">All</button>
                    <button onclick="setPriceFilter('LT100')" id="btn-price-LT100" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">&lt;100</button>
                    <button onclick="setPriceFilter('100-250')" id="btn-price-100-250" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">100-250</button>
                    <button onclick="setPriceFilter('250-500')" id="btn-price-250-500" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">250-500</button>
                    <button onclick="setPriceFilter('500-1000')" id="btn-price-500-1000" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">500-1000</button>
                    <button onclick="setPriceFilter('GT1000')" id="btn-price-GT1000" class="px-3 py-1.5 rounded-lg text-[13px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">&gt;1000</button>
                </div>

                <!-- SORT -->
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-[13px] text-zinc-600 font-bold uppercase shrink-0 font-mono">Sort:</span>
                    <select id="sort-select" onchange="setSort(this.value)" class="bg-zinc-900 border border-zinc-800 text-zinc-200 text-[13px] font-mono font-bold rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-sky-700">
                        <option value="momentum">Momentum Score</option>
                        <option value="change">% Change</option>
                        <option value="volume">Volume</option>
                        <option value="price">Price</option>
                        <option value="rsi">RSI</option>
                        <option value="name">Company Name</option>
                    </select>
                    <button id="sort-dir-btn" onclick="toggleSortDir()" title="Toggle sort direction" class="px-2.5 py-1.5 rounded-lg text-sm font-mono font-bold bg-zinc-900 text-zinc-300 border border-zinc-800 hover:border-zinc-600">↓ High to Low</button>
                    <button onclick="resetFilters()" class="px-2.5 py-1.5 rounded-lg text-[13px] font-mono font-bold bg-zinc-900 text-zinc-500 border border-zinc-800 hover:text-zinc-300 whitespace-nowrap ml-auto">↺ Reset</button>
                </div>
            </div>
            <p id="cap-filter-note" class="hidden text-[13px] text-amber-500/80 font-mono">📎 Large/Mid/Small filtering needs one extra file (data/market-cap.csv) — ask your assistant how to add it.</p>
        </div>

        <div class="flex-1 overflow-y-auto bg-zinc-950 border border-zinc-900 rounded-xl p-4 shadow-xl">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3" id="stock-directory-list">
                </div>
        </div>
    </div>

    <div id="workspace-overlay" class="hidden fixed inset-0 bg-black/90 z-50 p-0 sm:p-4 backdrop-blur-md"></div>

    <script>
        // historicalData: { TICKER: [ {date, open, high, low, close, prevClose, volume}, ... ] } sorted oldest -> newest
        let historicalData = {};
        let stockNames = {};      // TICKER -> full company name (from FinInstrmNm)
        let marketCapMap = {};    // TICKER -> 'LargeCap' | 'MidCap' | 'SmallCap' (optional, from data/market-cap.csv)
        let fundamentalsMap = {}; // TICKER -> {pe, roe, de, eps} (optional, from data/fundamentals.csv)
        let stockData = {};       // TICKER -> latest snapshot + computed momentum indicators
        let availableDates = [];
        let marketIndexCloses = [];   // synthetic equal-weighted index level per date, built from our own tracked universe
        let marketBreadth = { date: null, advancers: 0, decliners: 0, unchanged: 0, avgChangePct: 0 };
        let marketROC10 = null;
        let currentChartTicker = null;
        let chartType = 'candle';   // 'candle' | 'line'
        let showPivotPoints = false;
        let activeTab = 'momentum';   // which preset tab is highlighted (null when a custom sort is chosen)
        let sortKey = 'momentum';     // momentum | change | volume | price | rsi | name
        let sortDir = 'desc';         // desc | asc
        let capFilter = 'ALL';
        let priceFilter = 'ALL';

        const TAB_PRESETS = {
            momentum: { key: 'momentum', dir: 'desc' },
            traded:   { key: 'volume',   dir: 'desc' },
            bullish:  { key: 'change',   dir: 'desc' },
            bearish:  { key: 'change',   dir: 'asc'  }
        };
        const DEFAULT_DIR = { momentum: 'desc', volume: 'desc', change: 'desc', price: 'desc', rsi: 'desc', name: 'asc' };

        window.addEventListener('DOMContentLoaded', () => {
            rotateQuote();
            quoteInterval = setInterval(rotateQuote, 3500);
            fetchLiveMarketData();
        });

        const MARKET_QUOTES = [
            { text: "The stock market is a device for transferring money from the impatient to the patient.", author: "Warren Buffett" },
            { text: "Know what you own, and know why you own it.", author: "Peter Lynch" },
            { text: "Time in the market beats timing the market.", author: "Common market wisdom" },
            { text: "Risk comes from not knowing what you are doing.", author: "Warren Buffett" },
            { text: "In investing, what is comfortable is rarely profitable.", author: "Robert Arnott" },
            { text: "The four most dangerous words in investing are: 'this time it's different.'", author: "Sir John Templeton" },
            { text: "Price is what you pay. Value is what you get.", author: "Warren Buffett" },
            { text: "The market can stay irrational longer than you can stay solvent.", author: "John Maynard Keynes" },
            { text: "Every stock you own should be a business you would be happy to own.", author: "Peter Lynch" },
            { text: "Discipline is the bridge between goals and results.", author: "Common market wisdom" }
        ];
        let quoteIndex = 0;
        let quoteInterval = null;

        function rotateQuote() {
            const q = MARKET_QUOTES[quoteIndex % MARKET_QUOTES.length];
            const qEl = document.getElementById('loading-quote');
            const aEl = document.getElementById('loading-attribution');
            if (!qEl) return;
            qEl.style.opacity = 0;
            setTimeout(() => {
                qEl.textContent = `"${q.text}"`;
                if (aEl) aEl.textContent = `— ${q.author}`;
                qEl.style.opacity = 1;
            }, 300);
            quoteIndex++;
        }

        function setStatus(text) {
            const a = document.getElementById('all-directory-count');
            const b = document.getElementById('loading-status');
            if (a) a.innerText = text;
            if (b) b.innerText = text;
        }

        function hideLoadingScreen() {
            if (quoteInterval) clearInterval(quoteInterval);
            const el = document.getElementById('loading-screen');
            if (!el) return;
            el.style.opacity = 0;
            setTimeout(() => el.classList.add('hidden'), 500);
        }

        // ---------------------------------------------------------
        // DATA LOADING
        // ---------------------------------------------------------
        async function fetchLiveMarketData() {
            try {
                setStatus('LOADING DATE INDEX...');

                const datesResp = await fetch('data/dates.json');
                if (!datesResp.ok) throw new Error("Could not find data/dates.json");
                availableDates = await datesResp.json();
                availableDates.sort();
                if (availableDates.length === 0) throw new Error("data/dates.json is empty");

                // Optional: market cap classification (Large/Mid/Small). Silently skipped if not present.
                try {
                    const capResp = await fetch('data/market-cap.csv');
                    if (capResp.ok) {
                        const capText = await capResp.text();
                        const parsedCap = Papa.parse(capText, { header: true, skipEmptyLines: true });
                        parsedCap.data.forEach(row => {
                            const sym = (row['Symbol'] || row['SYMBOL'] || '').trim().toUpperCase();
                            const cat = (row['Category'] || row['CATEGORY'] || '').trim();
                            if (sym && cat) marketCapMap[sym] = cat;
                        });
                    }
                } catch (e) { /* optional file - fine if missing */ }

                // Optional: manually-curated fundamentals (P/E, ROE, D/E, EPS). Silently skipped if not present.
                try {
                    const fundResp = await fetch('data/fundamentals.csv');
                    if (fundResp.ok) {
                        const fundText = await fundResp.text();
                        const parsedFund = Papa.parse(fundText, { header: true, skipEmptyLines: true });
                        parsedFund.data.forEach(row => {
                            const sym = (row['Symbol'] || '').trim().toUpperCase();
                            if (!sym) return;
                            fundamentalsMap[sym] = {
                                pe: row['PE'] !== '' ? parseFloat(row['PE']) : null,
                                roe: row['ROE'] !== '' ? parseFloat(row['ROE']) : null,
                                de: row['DebtToEquity'] !== '' ? parseFloat(row['DebtToEquity']) : null,
                                eps: row['EPS'] !== '' ? parseFloat(row['EPS']) : null
                            };
                        });
                    }
                } catch (e) { /* optional file - fine if missing */ }

                historicalData = {};
                stockNames = {};
                let completed = 0;
                const total = availableDates.length;

                const fetchPromises = availableDates.map(date =>
                    fetch(`data/bhavcopy/${date}.csv`)
                        .then(r => r.ok ? r.text() : null)
                        .catch(() => null)
                        .then(text => {
                            completed++;
                            setStatus(`LOADING HISTORICAL DATA... ${completed}/${total} SESSIONS`);
                            return { date, text };
                        })
                );

                const results = await Promise.all(fetchPromises);

                results.forEach(({ date, text }) => {
                    if (!text) return;
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

                    parsed.data.forEach(row => {
                        if (row['SctySrs'] !== 'EQ') return; // mainboard equity only

                        const ticker = row['TckrSymb'];
                        if (!ticker) return;

                        const close = parseFloat(row['ClsPric'] || 0);
                        const open = parseFloat(row['OpnPric'] || 0);
                        const high = parseFloat(row['HghPric'] || 0);
                        const low = parseFloat(row['LwPric'] || 0);
                        const prevClose = parseFloat(row['PrvsClsgPric'] || close);
                        const volume = parseFloat(row['TtlTradgVol'] || row['TOTTRDQTY'] || row['TotTrdQty'] || 0);

                        if (!close) return;

                        if (!historicalData[ticker]) historicalData[ticker] = [];
                        historicalData[ticker].push({ date, open, high, low, close, prevClose, volume });

                        if (row['FinInstrmNm']) stockNames[ticker] = row['FinInstrmNm'];
                    });
                });

                Object.keys(historicalData).forEach(t => {
                    historicalData[t].sort((a, b) => a.date.localeCompare(b.date));
                });

                buildMarketContext();
                buildMomentumSnapshot();
                renderMarketSentiment();

                if (Object.keys(marketCapMap).length === 0) {
                    ['LargeCap', 'MidCap', 'SmallCap'].forEach(c => {
                        const btn = document.getElementById(`btn-cap-${c}`);
                        if (btn) {
                            btn.disabled = true;
                            btn.title = 'Add data/market-cap.csv to enable this filter';
                            btn.classList.add('opacity-30', 'cursor-not-allowed');
                        }
                    });
                    document.getElementById('cap-filter-note').classList.remove('hidden');
                }

                loadView('momentum');
                setStatus(`SYSTEM READY: TRACKING ${Object.keys(stockData).length} EQUITIES ACROSS ${availableDates.length} SESSIONS`);
                hideLoadingScreen();

            } catch (e) {
                console.error("Data Load Failed:", e);
                setStatus(`DATA LOAD FAILED: ${e.message}`);
                hideLoadingScreen();
            }
        }

        // ---------------------------------------------------------
        // INDICATOR MATH
        // ---------------------------------------------------------
        function calcSMA(values, period) {
            if (values.length < period) return null;
            const slice = values.slice(-period);
            return slice.reduce((s, v) => s + v, 0) / period;
        }

        function calcRSI(closes, period = 14) {
            if (closes.length < period + 1) return null;
            let gains = 0, losses = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) gains += diff; else losses += Math.abs(diff);
            }
            const avgGain = gains / period, avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calcROC(closes, period) {
            if (closes.length < period + 1) return null;
            const past = closes[closes.length - 1 - period];
            const now = closes[closes.length - 1];
            if (!past) return null;
            return ((now - past) / past) * 100;
        }

        // ---------------------------------------------------------
        // MARKET SENTIMENT CONTEXT
        // Built entirely from our own tracked universe of stocks -
        // no external index/benchmark feed required.
        // ---------------------------------------------------------
        function buildMarketContext() {
            // Fast lookup: ticker -> {date: close}
            const closeByDate = {};
            Object.keys(historicalData).forEach(ticker => {
                const map = {};
                historicalData[ticker].forEach(h => { map[h.date] = h.close; });
                closeByDate[ticker] = map;
            });

            // Equal-weighted daily return across every tracked stock, compounded into a synthetic index level
            const dailyAvgReturns = [];
            for (let i = 1; i < availableDates.length; i++) {
                const today = availableDates[i], yest = availableDates[i - 1];
                let sum = 0, count = 0;
                Object.keys(closeByDate).forEach(ticker => {
                    const c1 = closeByDate[ticker][yest], c2 = closeByDate[ticker][today];
                    if (c1 && c2) { sum += (c2 - c1) / c1; count++; }
                });
                dailyAvgReturns.push(count > 0 ? sum / count : 0);
            }

            marketIndexCloses = [100];
            dailyAvgReturns.forEach(r => marketIndexCloses.push(marketIndexCloses[marketIndexCloses.length - 1] * (1 + r)));
            marketROC10 = calcROC(marketIndexCloses, 10);

            // Today's market breadth (advancers vs decliners) across the whole tracked universe
            const latestDate = availableDates[availableDates.length - 1];
            const prevDate = availableDates[availableDates.length - 2];
            let advancers = 0, decliners = 0, unchanged = 0, changeSum = 0, changeCount = 0;
            if (prevDate) {
                Object.keys(closeByDate).forEach(ticker => {
                    const c1 = closeByDate[ticker][prevDate], c2 = closeByDate[ticker][latestDate];
                    if (c1 && c2) {
                        const pct = (c2 - c1) / c1 * 100;
                        if (pct > 0.05) advancers++; else if (pct < -0.05) decliners++; else unchanged++;
                        changeSum += pct; changeCount++;
                    }
                });
            }
            marketBreadth = { date: latestDate, advancers, decliners, unchanged, avgChangePct: changeCount > 0 ? changeSum / changeCount : 0 };
        }

        function renderMarketSentiment() {
            const el = document.getElementById('market-sentiment-badge');
            if (!el) return;
            const total = marketBreadth.advancers + marketBreadth.decliners + marketBreadth.unchanged;
            if (total === 0) { el.classList.add('hidden'); return; }
            const advPct = Math.round(marketBreadth.advancers / total * 100);
            let mood, colorClass;
            if (advPct >= 60) { mood = 'Bullish'; colorClass = 'text-emerald-400 border-emerald-800 bg-emerald-950'; }
            else if (advPct <= 40) { mood = 'Bearish'; colorClass = 'text-rose-400 border-rose-800 bg-rose-950'; }
            else { mood = 'Neutral'; colorClass = 'text-amber-400 border-amber-800 bg-amber-950'; }

            el.className = `flex items-center gap-2 px-3 py-2 rounded-xl font-mono text-sm border ${colorClass}`;
            el.innerHTML = `<span class="font-bold">${mood}</span><span class="text-[12px] opacity-80">${advPct}% advancing (${marketBreadth.advancers}↑ ${marketBreadth.decliners}↓)</span>`;
            el.classList.remove('hidden');
        }

        function computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price, volSurge, relStrength }) {
            let score = 0;
            const breakdown = [];

            // Factor 1: 5-day price momentum - max 20 pts
            if (roc5 !== null) {
                const pts = Math.round(Math.max(0, Math.min(20, roc5 * 2)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: '5-Day Price Momentum',
                    value: `${roc5 >= 0 ? '+' : ''}${roc5.toFixed(1)}%`,
                    points: pts, max: 20,
                    note: roc5 > 3 ? 'Strong short-term push upward' : roc5 < -3 ? 'Recent pullback over the last week' : 'Little short-term movement either way'
                });
            } else {
                breakdown.push({ label: '5-Day Price Momentum', value: 'N/A', points: 0, max: 20, note: 'Not enough history yet (needs 5+ sessions)' });
            }

            // Factor 2: 10-day price momentum - max 10 pts, only rewards positive moves
            if (roc10 !== null) {
                const pts = Math.round(Math.max(0, Math.min(10, roc10 * 0.8)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: '10-Day Price Momentum',
                    value: `${roc10 >= 0 ? '+' : ''}${roc10.toFixed(1)}%`,
                    points: pts, max: 10,
                    note: roc10 > 0 ? 'Still climbing over a 2-week window' : 'No 2-week tailwind (only upward moves earn points here)'
                });
            } else {
                breakdown.push({ label: '10-Day Price Momentum', value: 'N/A', points: 0, max: 10, note: 'Not enough history yet (needs 10+ sessions)' });
            }

            // Factor 3: price vs 20-day average - max 15 pts
            if (sma20 !== null && price) {
                const above = price > sma20;
                const pts = above ? 15 : 0;
                score += pts;
                breakdown.push({
                    label: 'Price vs 20-Day Average',
                    value: `₹${price.toFixed(2)} vs ₹${sma20.toFixed(2)} avg`,
                    points: pts, max: 15,
                    note: above ? 'Trading above its 20-day average — an established short-term uptrend' : 'Trading below its 20-day average — no uptrend confirmation'
                });
            } else {
                breakdown.push({ label: 'Price vs 20-Day Average', value: 'N/A', points: 0, max: 15, note: 'Not enough history yet (needs 20+ sessions)' });
            }

            // Factor 4: is the 20-day average itself rising - max 10 pts
            if (sma20 !== null && sma20Prev !== null) {
                const rising = sma20 > sma20Prev;
                const pts = rising ? 10 : 0;
                score += pts;
                breakdown.push({
                    label: '20-Day Average Direction',
                    value: rising ? 'Rising' : 'Flat / falling',
                    points: pts, max: 10,
                    note: rising ? 'The trend itself is strengthening, not just a single-day spike' : 'The underlying trend is not yet confirmed as rising'
                });
            } else {
                breakdown.push({ label: '20-Day Average Direction', value: 'N/A', points: 0, max: 10, note: 'Not enough history yet (needs 25+ sessions)' });
            }

            // Factor 5: RSI(14) - max 15 pts, tiered
            if (rsi14 !== null) {
                let pts, note;
                if (rsi14 >= 50 && rsi14 <= 70) { pts = 15; note = 'Healthy momentum zone — rising with room to run'; }
                else if (rsi14 > 70 && rsi14 <= 80) { pts = 8; note = 'Strong, but starting to get stretched'; }
                else if (rsi14 > 80) { pts = 0; note = 'Overbought — a pullback becomes more likely here'; }
                else if (rsi14 >= 30 && rsi14 < 50) { pts = 6; note = 'Neutral — no strong signal either way'; }
                else { pts = 0; note = 'Oversold / weak — momentum is against the stock'; }
                score += pts;
                breakdown.push({ label: 'RSI (14-day)', value: rsi14.toFixed(0), points: pts, max: 15, note });
            } else {
                breakdown.push({ label: 'RSI (14-day)', value: 'N/A', points: 0, max: 15, note: 'Not enough history yet (needs 15+ sessions)' });
            }

            // Factor 6: volume surge vs 20-day average - max 10 pts, tiered
            if (volSurge !== null) {
                let pts, note;
                if (volSurge > 1.5) { pts = 10; note = 'Unusually high volume — strong conviction behind the move'; }
                else if (volSurge > 1.2) { pts = 5; note = 'Somewhat elevated volume'; }
                else { pts = 0; note = 'Normal or below-average volume — less conviction behind the move'; }
                score += pts;
                breakdown.push({ label: 'Volume vs 20-Day Average', value: `${volSurge.toFixed(2)}x`, points: pts, max: 10, note });
            } else {
                breakdown.push({ label: 'Volume vs 20-Day Average', value: 'N/A', points: 0, max: 10, note: 'Not enough history yet' });
            }

            // Factor 7 (NEW): Relative Strength vs overall market - max 20 pts
            // Rewards stocks outperforming the broader market, not just moving with it.
            // "Market" here is our own equal-weighted index built from every tracked stock.
            if (relStrength !== null) {
                const pts = Math.round(Math.max(0, Math.min(20, relStrength * 2)) * 10) / 10;
                score += pts;
                breakdown.push({
                    label: 'Relative Strength vs Market',
                    value: `${relStrength >= 0 ? '+' : ''}${relStrength.toFixed(1)}% vs market`,
                    points: pts, max: 20,
                    note: relStrength > 3 ? 'Meaningfully beating the broader market — real outperformance, not just a rising tide' : relStrength < -3 ? 'Lagging the broader market over this period' : 'Moving roughly in line with the overall market'
                });
            } else {
                breakdown.push({ label: 'Relative Strength vs Market', value: 'N/A', points: 0, max: 20, note: 'Not enough market-wide history yet' });
            }

            score = Math.max(0, Math.min(100, Math.round(score)));
            return { score, breakdown };
        }

        function getVerdict(score) {
            if (score >= 65) return { label: 'BUY', text: 'text-emerald-400', badge: 'bg-emerald-950 text-emerald-400 border-emerald-800' };
            if (score >= 40) return { label: 'HOLD', text: 'text-amber-400', badge: 'bg-amber-950 text-amber-400 border-amber-800' };
            return { label: 'AVOID', text: 'text-rose-400', badge: 'bg-rose-950 text-rose-400 border-rose-800' };
        }

        function buildMomentumSnapshot() {
            stockData = {};
            Object.keys(historicalData).forEach(ticker => {
                const hist = historicalData[ticker];
                if (hist.length < 2) return;

                const closes = hist.map(h => h.close);
                const volumes = hist.map(h => h.volume);
                const latest = hist[hist.length - 1];
                const prev = hist[hist.length - 2];

                const change = prev.close > 0 ? ((latest.close - prev.close) / prev.close) * 100 : 0;
                const roc5 = calcROC(closes, 5);
                const roc10 = calcROC(closes, 10);
                const roc20 = calcROC(closes, 20);
                const sma20 = calcSMA(closes, 20);
                const sma20Prev = closes.length >= 25 ? calcSMA(closes.slice(0, -5), 20) : null;
                const rsi14 = calcRSI(closes, 14);
                const avgVol20 = calcSMA(volumes.slice(0, -1), Math.min(20, volumes.length - 1)) || null;
                const volSurge = avgVol20 && avgVol20 > 0 ? latest.volume / avgVol20 : null;
                const relStrength = (roc10 !== null && marketROC10 !== null) ? (roc10 - marketROC10) : null;

                const { score, breakdown } = computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price: latest.close, volSurge, relStrength });

                stockData[ticker] = {
                    symbol: ticker,
                    name: stockNames[ticker] || ticker,
                    price: latest.close,
                    dayHigh: latest.high,
                    dayLow: latest.low,
                    volume: latest.volume,
                    change,
                    roc5, roc10, roc20, rsi14, sma20, volSurge, relStrength,
                    momentumScore: score,
                    breakdown,
                    capCategory: marketCapMap[ticker] || null,
                    sessionsTracked: hist.length
                };
            });
        }

        function getSortValue(ticker, key) {
            const d = stockData[ticker];
            switch (key) {
                case 'momentum': return d.momentumScore;
                case 'volume': return d.volume;
                case 'change': return d.change;
                case 'price': return d.price;
                case 'rsi': return d.rsi14 === null ? -Infinity : d.rsi14;
                case 'name': return d.name || '';
                default: return 0;

        function matchesPriceFilter(price) {
            switch (priceFilter) {
                case 'LT100': return price < 100;
                case '100-250': return price >= 100 && price < 250;
                case '250-500': return price >= 250 && price < 500;

                                    const peNote = f.pe !== null ? (f.pe < 15 ? 'Relatively cheap' : f.pe > 40 ? 'Richly valued' : 'Moderate valuation') : '';
                                    const roeNote = f.roe !== null ? (f.roe > 15 ? 'Strong profitability' : f.roe < 8 ? 'Weak profitability' : 'Average profitability') : '';
                                    const deNote = f.de !== null ? (f.de < 0.5 ? 'Low debt' : f.de > 1.5 ? 'High debt load' : 'Moderate debt') : '';
                                    return `
                                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mb-3 flex justify-between items-center">
                                            <span class="text-zinc-500 uppercase">P/E Ratio</span>
                                            <span class="text-right"><span class="text-zinc-100 font-bold">${f.pe !== null ? f.pe : 'N/A'}</span>${f.pe !== null ? `<div class="text-[12px] text-zinc-600">${peNote}</div>` : ''}</span>
                                        </div>
                                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mb-3 flex justify-between items-center">
                                            <span class="text-zinc-500 uppercase">ROE</span>
                                            <span class="text-right"><span class="text-zinc-100 font-bold">${f.roe !== null ? f.roe + '%' : 'N/A'}</span>${f.roe !== null ? `<div class="text-[12px] text-zinc-600">${roeNote}</div>` : ''}</span>
                                        </div>
                                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mb-3 flex justify-between items-center">
                                            <span class="text-zinc-500 uppercase">Debt / Equity</span>
                                            <span class="text-right"><span class="text-zinc-100 font-bold">${f.de !== null ? f.de : 'N/A'}</span>${f.de !== null ? `<div class="text-[12px] text-zinc-600">${deNote}</div>` : ''}</span>
                                        </div>
                                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mb-3 flex justify-between">
                                            <span class="text-zinc-500 uppercase">EPS</span>
                                            <span class="text-zinc-100 font-bold">${f.eps !== null ? '₹' + f.eps : 'N/A'}</span>
                                        </div>
                                        <div class="text-[12px] text-zinc-600 font-mono mt-2">Manually entered from Screener.in — update periodically as results are released.</div>
                                    `;
                                })()}
                            </div>

                            <div id="panel-tab-news" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 overflow-hidden relative">
                                <div id="tv-news-container" class="w-full h-full overflow-y-auto absolute inset-0"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            currentChartTicker = ticker;
            setTimeout(() => renderPriceChart(ticker), 50);
        };

        // Chart state - remembers the user's chosen view across stock switches
        window.setChartType = function(type) {
            chartType = type;
            document.getElementById('btn-chart-candle').className = type === 'candle'
                ? "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-zinc-800 text-zinc-200 border border-zinc-700"
                : "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300";
            document.getElementById('btn-chart-line').className = type === 'line'
                ? "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-zinc-800 text-zinc-200 border border-zinc-700"
                : "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300";
            if (currentChartTicker) renderPriceChart(currentChartTicker);
        };

        window.togglePivotPoints = function() {
            showPivotPoints = !showPivotPoints;
            const btn = document.getElementById('btn-chart-pivot');
            btn.className = showPivotPoints
                ? "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-sky-950 text-sky-400 border border-sky-800 ml-auto"
                : "px-2.5 py-1 rounded-lg text-[12px] font-mono font-bold bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 ml-auto";
            if (currentChartTicker) renderPriceChart(currentChartTicker);
        };

        // Classic daily pivot points, calculated from the most recent session's High/Low/Close.
        // These are the standard support/resistance levels short-term traders watch.
        function calcPivotPoints(latest) {
            const { high, low, close } = latest;
            const p = (high + low + close) / 3;
            return {
                p,
                r1: 2 * p - low, r2: p + (high - low), r3: high + 2 * (p - low),
                s1: 2 * p - high, s2: p - (high - low), s3: low - 2 * (high - p)
            };
        }

        // Draws a chart using our own NSE bhavcopy history (not TradingView's live feed).
        // This is the free, open-source "Lightweight Charts" library from TradingView -
        // it just draws whatever data we give it, no exchange/license restrictions.
        function renderPriceChart(ticker) {
            const container = document.getElementById('own-chart-container');
            if (!container) return;
            container.innerHTML = '';
            const hist = historicalData[ticker] || [];
            if (hist.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-zinc-600 text-sm font-mono">No price history available for this stock</div>';
                return;
            }

            const chart = LightweightCharts.createChart(container, {
                layout: { background: { color: 'transparent' }, textColor: '#a1a1aa' },
                grid: { vertLines: { color: '#18181b' }, horzLines: { color: '#18181b' } },
                timeScale: { borderColor: '#3f3f46' },
                rightPriceScale: { borderColor: '#3f3f46' },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                autoSize: true
            });

            let mainSeries;
            if (chartType === 'line') {
                const lineData = hist.map(h => ({ time: h.date, value: h.close }));
                mainSeries = chart.addLineSeries({ color: '#38bdf8', lineWidth: 2 });
                mainSeries.setData(lineData);
            } else {
                const candleData = hist.map(h => ({ time: h.date, open: h.open, high: h.high, low: h.low, close: h.close }));
                mainSeries = chart.addCandlestickSeries({
                    upColor: '#10b981', downColor: '#f43f5e', borderVisible: false,
                    wickUpColor: '#10b981', wickDownColor: '#f43f5e'
                });
                mainSeries.setData(candleData);
            }

            const volumeData = hist.map(h => ({
                time: h.date,
                value: h.volume,
                color: h.close >= h.open ? 'rgba(16,185,129,0.5)' : 'rgba(244,63,94,0.5)'
            }));
            const volumeSeries = chart.addHistogramSeries({
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 }
            });
            volumeSeries.setData(volumeData);

            if (showPivotPoints) {
                const latest = hist[hist.length - 1];
                const pv = calcPivotPoints(latest);
                const lines = [
                    { value: pv.r3, color: '#f43f5e', title: 'R3' },
                    { value: pv.r2, color: '#fb923c', title: 'R2' },
                    { value: pv.r1, color: '#fbbf24', title: 'R1' },
                    { value: pv.p, color: '#38bdf8', title: 'Pivot' },
                    { value: pv.s1, color: '#fbbf24', title: 'S1' },
                    { value: pv.s2, color: '#fb923c', title: 'S2' },
                    { value: pv.s3, color: '#f43f5e', title: 'S3' }
                ];
                lines.forEach(l => {
                    mainSeries.createPriceLine({
                        price: l.value, color: l.color, lineWidth: 1,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true, title: l.title
                    });
                });
            }

            chart.timeScale().fitContent();
        }

        window.toggleBreakdown = function() {
            const panel = document.getElementById('breakdown-panel');
            const arrow = document.getElementById('breakdown-toggle-arrow');
            const isHidden = panel.classList.contains('hidden');
            panel.classList.toggle('hidden');
            arrow.textContent = isHidden ? '▴' : '▾';
        };

        window.closeWorkspace = function() {
            const overlay = document.getElementById('workspace-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex', 'items-center', 'justify-center');
            overlay.innerHTML = '';
        };

        window.toggleWorkspaceTab = function(activeTab, ticker) {
            const tabs = ['momentum', 'decoder', 'fundamentals', 'news'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`btn-tab-${tab}`);
                const panel = document.getElementById(`panel-tab-${tab}`);
                if (tab === activeTab) {
                    btn.className = btn.className.replace('border-transparent', 'border-sky-500').replace('text-zinc-500', 'text-sky-400');
                    panel.classList.remove('hidden'); panel.classList.add('flex');
                } else {
                    btn.className = btn.className.replace('border-sky-500', 'border-transparent').replace('text-sky-400', 'text-zinc-500');
                    panel.classList.add('hidden'); panel.classList.remove('flex');
                }
            });

            if (activeTab === 'decoder') {
                const container = document.getElementById('tv-decoder-container');
                if (container && container.innerHTML.trim() === '') {
                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js'; script.async = true;
                    script.text = JSON.stringify({ "interval": "1D", "width": "100%", "isTransparent": true, "height": "100%", "symbol": `BSE:${ticker}`, "showIntervalTabs": true, "displayMode": "single", "locale": "en", "colorTheme": "dark" });
                    container.appendChild(script);
                }
            }
            
            if (activeTab === 'news') {
                const container = document.getElementById('tv-news-container');
                if (container && container.innerHTML.trim() === '') {
                    container.innerHTML = `<div class="p-6 text-center text-zinc-500 text-sm font-mono animate-pulse">📡 Scanning dynamic news matrix for ${ticker}...</div>`;
                    fetchLiveNews(ticker, container);
                }
            }
        };

        async function fetchLiveNews(ticker, container) {
            try {
                const query = encodeURIComponent(`${ticker} stock India news`);
                const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=en-IN&gl=IN&ceid=IN:en`);
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "ok" && data.items && data.items.length > 0) {
                    let html = '<div class="p-3 flex flex-col gap-3 pb-8">';
                    data.items.slice(0, 10).forEach(item => {
                        const source = item.source || 'Market Update';
                        const pubDate = new Date(item.pubDate);
                        const dateString = pubDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

                        html += `
                            <a href="${item.link}" target="_blank" class="block bg-zinc-900/60 hover:bg-zinc-800/90 border border-zinc-800/80 p-3.5 rounded-xl transition-all duration-200 group shadow-md">
                                <h4 class="text-sm font-semibold text-zinc-200 group-hover:text-sky-400 mb-2 leading-relaxed">${item.title}</h4>
                                <div class="flex justify-between items-center mt-2 border-t border-zinc-800/40 pt-2 font-mono text-[12px] text-zinc-500">
                                    <span class="uppercase tracking-wider font-bold">${source}</span>
                                    <span>${dateString}</span>
                                </div>
                            </a>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="p-6 text-center text-zinc-500 text-sm font-mono">No localized stock news tiles available.</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="p-6 text-center text-rose-500 text-sm font-mono">⚠️ Telemetry error parsing feed sync.</div>';
            }
        }
    </script>
</body>
</html>
