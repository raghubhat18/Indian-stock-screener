<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Stock Screener Ultra</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        
        /* FULL SCREEN FLEXIBLE CONTAINER */
        .container { max-width: 1400px; margin: 0 auto; width: 100%; }
        
        h1 { text-align: center; color: #00ff88; font-size: 26px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        
        /* FILTERS ROW STYLING */
        .controls-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        @media (min-width: 600px) {
            .controls-grid { grid-template-columns: 2fr 1fr 1fr; }
        }

        .tabs { display: flex; background: #1e1e1e; border-radius: 8px; padding: 4px; border: 1px solid #2d2d2d; }
        .tab { flex: 1; text-align: center; padding: 12px 6px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #aaa; transition: 0.2s; }
        .tab.active { background: #00ff88; color: #121212; }
        
        select { background: #1e1e1e; color: #fff; border: 1px solid #2d2d2d; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; cursor: pointer; }

        /* RESPONSIVE FULL SCREEN GRID FOR CARDS */
        #stock-list { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }
        @media (min-width: 600px) { #stock-list { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1000px) { #stock-list { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1300px) { #stock-list { grid-template-columns: repeat(4, 1fr); } }

        /* CARD COSMETICS */
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d2d; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); border-color: #444; }
        .ticker { font-weight: bold; font-size: 18px; color: #ffffff; letter-spacing: 0.5px; }
        .meta-tag { font-size: 11px; color: #aaa; background: #2a2a2a; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 6px; }
        .score-badge { padding: 8px 14px; border-radius: 8px; font-weight: bold; font-size: 15px; text-align: right; min-width: 80px; }
        .positive { background: rgba(0, 255, 136, 0.12); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .negative { background: rgba(255, 69, 58, 0.12); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇮🇳 Indian Stock Screener Ultra</h1>
        <div class="subtitle">Real-Time Multi-Horizon Momentum Tracker</div>

        <div class="controls-grid">
            <!-- Cap Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="filterCap('All', this)">All Caps</div>
                <div class="tab" onclick="filterCap('Large', this)">Large</div>
                <div class="tab" onclick="filterCap('Mid', this)">Mid</div>
                <div class="tab" onclick="filterCap('Small', this)">Small</div>
            </div>

            <!-- Sector Filter -->
            <div>
                <select id="sectorDropdown" onchange="filterSector(this.value)">
                    <option value="All">All Sectors</option>
                </select>
            </div>

            <!-- Dynamic Horizon Lookback Filter -->
            <div>
                <select id="timeframeDropdown" onchange="filterTimeframe(this.value)">
                    <option value="1D">Horizon: 1 Day</option>
                    <option value="1W" selected>Horizon: 1 Week</option>
                    <option value="1M">Horizon: 1 Month</option>
                    <option value="1Y">Horizon: 1 Year</option>
                    <option value="2Y">Horizon: 2 Years</option>
                    <option value="3Y">Horizon: 3 Years</option>
                    <option value="4Y">Horizon: 4 Years</option>
                    <option value="5Y">Horizon: 5 Years</option>
                </select>
            </div>
        </div>

        <!-- Cards Display Surface -->
        <div id="stock-list">Processing multi-horizon queries...</div>
    </div>

    <script>
        let rawStockData = [];
        let currentCap = 'All';
        let currentSector = 'All';
        let currentTimeframe = '1W';

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                rawStockData = data;
                populateSectors(data);
                renderDashboard();
            }).catch(() => {
                document.getElementById('stock-list').innerHTML = "Run the GitHub action to initialize multi-year tracking records.";
            });

        function populateSectors(data) {
            const dropdown = document.getElementById('sectorDropdown');
            const sectors = [...new Set(data.map(item => item.sector))].sort();
            sectors.forEach(sec => {
                const opt = document.createElement('option');
                opt.value = sec;
                opt.textContent = sec;
                dropdown.appendChild(opt);
            });
        }

        function filterCap(capValue, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            currentCap = capValue;
            renderDashboard();
        }

        function filterSector(sectorValue) {
            currentSector = sectorValue;
            renderDashboard();
        }

        function filterTimeframe(tfValue) {
            currentTimeframe = tfValue;
            renderDashboard();
        }

        function renderDashboard() {
            const listContainer = document.getElementById('stock-list');
            listContainer.innerHTML = '';

            // 1. Structural Category Filtering
            let filtered = rawStockData.filter(stock => {
                const matchesCap = (currentCap === 'All' || stock.cap === currentCap);
                const matchesSector = (currentSector === 'All' || stock.sector === currentSector);
                return matchesCap && matchesSector;
            });

            // 2. Dynamic Real-Time Sorting by Selected Horizon Value
            filtered.sort((a, b) => (b.returns[currentTimeframe] || 0) - (a.returns[currentTimeframe] || 0));

            if(filtered.length === 0) {
                listContainer.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:40px; color:#666;'>No stock fits this combination matrix.</div>";
                return;
            }

            // 3. Render Generated Interface Elements
            filtered.forEach(stock => {
                const performanceValue = stock.returns[currentTimeframe] || 0;
                const isPositive = performanceValue >= 0;
                const badgeClass = isPositive ? 'positive' : 'negative';
                const sign = isPositive ? '+' : '';
                
                listContainer.innerHTML += `
                    <div class="card">
                        <div>
                            <div class="ticker">${stock.ticker}</div>
                            <div class="meta-tag">${stock.cap} Cap • ${stock.sector}</div>
                        </div>
                        <div class="score-badge ${badgeClass}">
                            <div>${sign}${performanceValue}%</div>
                        </div>
                    </div>
                `;
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
