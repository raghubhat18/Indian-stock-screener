<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBK NiftyPulse Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #000; color: #e4e4e7; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white">RBK Nifty<span class="text-emerald-400">Pulse</span></h1>
            <p id="status-bar" class="text-xs text-zinc-500 font-mono mt-2 uppercase">Connecting to live feed...</p>
        </header>

        <div class="flex justify-center gap-2 mb-6 flex-wrap">
            <button onclick="switchView('allstocks')" class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-xs font-bold hover:border-emerald-500">🔍 ALL STOCKS</button>
            <button onclick="switchView('momentum')" class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-xs font-bold hover:border-emerald-500">⚡ MOMENTUM</button>
        </div>

        <main id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></main>
    </div>

    <div id="workspace" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
        <div class="flex justify-between p-4 border-b border-zinc-800">
            <span id="ws-title" class="font-bold text-emerald-400"></span>
            <button onclick="document.getElementById('workspace').classList.add('hidden')" class="text-zinc-400">✕ CLOSE</button>
        </div>
        <div id="tv-chart" class="flex-1 p-2"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwwyyH3aWB90MVa7Syw87wZSU3lEMe6twlVD4xVzJVaZF0AV_PSFU9Q-QCyjHrb5wI0FA/exec";
        let masterData = {};

        async function init() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                document.getElementById('status-bar').innerText = "LIVE: DATA SYNCED";
                
                // Process Data
                ['large', 'mid', 'small'].forEach(cap => {
                    ['bullish', 'bearish'].forEach(trend => {
                        json[cap][trend].forEach(s => {
                            masterData[s.ticker] = { ...s, cap };
                        });
                    });
                });
                render('allstocks');
            } catch(e) { document.getElementById('status-bar').innerText = "CONNECTION FAILED"; }
        }

        function render(view) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            Object.entries(masterData).forEach(([ticker, data]) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 p-4 rounded-xl cursor-pointer hover:border-emerald-500 transition-all";
                card.onclick = () => openWS(ticker);
                card.innerHTML = `
                    <h3 class="font-bold">${ticker}</h3>
                    <p class="text-[10px] text-zinc-500 uppercase">${data.cap} Cap</p>
                    <p class="text-emerald-400 font-mono mt-2">₹${data.price} <span class="text-zinc-600">${data.change}%</span></p>
                `;
                grid.appendChild(card);
            });
        }

        function openWS(ticker) {
            document.getElementById('ws-title').innerText = '■ ' + ticker + ' WORKSPACE';
            document.getElementById('workspace').classList.remove('hidden');
            new TradingView.widget({
                "autosize": true,
                "symbol": `NSE:${ticker}`,
                "interval": "D",
                "theme": "dark",
                "container_id": "tv-chart"
            });
        }

        init();
    </script>
</body>
</html>
