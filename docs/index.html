<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Stock Screener Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- TradingView Core Library for Advanced Chart -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        /* Custom scrollbar styling for terminal feel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen font-sans selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-emerald-400 tracking-tight flex items-center justify-center gap-2">
                <span class="bg-emerald-950 text-emerald-400 text-xs px-2 py-1 rounded border border-emerald-800">IN</span>
                Indian Stock Screener Terminal
            </h1>
            <p class="text-zinc-500 text-xs mt-1 font-mono">Click any stock card to open split terminal workspace</p>
        </header>

        <!-- Dynamic Controls & Filters Row -->
        <div class="flex flex-col gap-4 mb-6 bg-zinc-900/80 p-4 rounded-xl border border-zinc-800/80 backdrop-blur-sm shadow-xl">
            <div class="flex flex-wrap items-center justify-between gap-4">
                
                <!-- Market Cap Toggles -->
                <div class="flex flex-wrap gap-2" id="cap-filters">
                    <button onclick="setCapFilter('all')" data-cap="all" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">All Caps</button>
                    <button onclick="setCapFilter('large')" data-cap="large" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">Large</button>
                    <button onclick="setCapFilter('mid')" data-cap="mid" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">Mid</button>
                    <button onclick="setCapFilter('small')" data-cap="small" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-emerald-500 text-white font-semibold cursor-pointer shadow-lg shadow-emerald-950">Small</button>
                </div>

                <!-- Dropdowns -->
                <div class="flex flex-wrap gap-3 items-center w-full sm:w-auto">
                    <!-- Sector Filter -->
                    <select id="sector-filter" onchange="filterStocks()" class="w-full sm:w-auto bg-zinc-950 text-zinc-200 px-3 py-1.5 rounded-lg border border-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">
                        <option value="all">All Sectors</option>
                    </select>

                    <!-- Price Grouping Filter -->
                    <select id="price-filter" onchange="filterStocks()" class="w-full sm:w-auto bg-zinc-950 text-zinc-200 px-3 py-1.5 rounded-lg border border-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">
                        <option value="all">All Prices</option>
                        <option value="under100">&lt; ₹100</option>
                        <option value="100-250">₹100 - ₹250</option>
                        <option value="250-500">₹250 - ₹500</option>
                        <option value="500-1000">₹500 - ₹1000</option>
                        <option value="1000-2500">₹1000 - ₹2500</option>
                        <option value="over2500">&gt; ₹2500</option>
                    </select>
                    
                    <!-- Performance Horizon Filter -->
                    <select id="horizon-filter" onchange="filterStocks()" class="w-full sm:w-auto bg-zinc-950 text-zinc-200 px-3 py-1.5 rounded-lg border border-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">
                        <option value="1w">Horizon: 1 Week</option>
                        <option value="1m">Horizon: 1 Month</option>
                        <option value="3m">Horizon: 3 Months</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Stock Cards Grid Container -->
        <main id="stock-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- Dynamic Cards Inserted Here -->
        </main>
    </div>

    <!-- Active Split Terminal Workspace View Overlay -->
    <div id="workspace-overlay" class="hidden"></div>

    <!-- Application Script -->
    <script>
        // Expanded seed data matching your exact layout & values
        const stockData = {
            "CEATLTD": { name: "CEAT Ltd.", cap: "small", sector: "Automobile", price: 3858.6, changes: { "1w": 6.16, "1m": 12.4, "3m": -2.1 } },
            "CENTURYPLY": { name: "Century Plyboards (India) Ltd.", cap: "small", sector: "Materials", price: 770.25, changes: { "1w": 3.59, "1m": -1.2, "3m": 8.4 } },
            "HFCL": { name: "HFCL Ltd.", cap: "small", sector: "Telecom", price: 214.74, changes: { "1w": 1.25, "1m": 5.8, "3m": 19.3 } },
            "CDSL": { name: "Central Depository Services (India) Ltd.", cap: "small", sector: "Capital Markets", price: 1311.40, changes: { "1w": -1.58, "1m": 4.1, "3m": 22.5 } },
            "ANGELONE": { name: "Angel One Ltd.", cap: "small", sector: "Capital Markets", price: 331.20, changes: { "1w": -2.70, "1m": -8.3, "3m": -4.2 } },
            "CYIENT": { name: "Cyient Ltd.", cap: "small", sector: "IT", price: 834.85, changes: { "1w": -3.03, "1m": 2.9, "3m": -11.4 } },
            
            // Supporting variations across price groups/caps for fully interactive filtering demo
            "RELIANCE": { name: "Reliance Industries Ltd.", cap: "large", sector: "Energy", price: 2452.10, changes: { "1w": 1.85, "1m": 3.4, "3m": 7.1 } },
            "TCS": { name: "Tata Consultancy Services Ltd.", cap: "large", sector: "IT", price: 3820.00, changes: { "1w": -0.45, "1m": 5.1, "3m": 9.3 } },
            "YESBANK": { name: "Yes Bank Ltd.", cap: "small", sector: "Banking", price: 22.15, changes: { "1w": 4.20, "1m": -3.1, "3m": 14.8 } },
            "IDEA": { name: "Vodafone Idea Ltd.", cap: "small", sector: "Telecom", price: 12.45, changes: { "1w": -5.12, "1m": -14.2, "3m": 2.5 } },
            "TATASTEEL": { name: "Tata Steel Ltd.", cap: "large", sector: "Materials", price: 145.30, changes: { "1w": 2.10, "1m": -1.5, "3m": 11.2 } },
            "VOLTAS": { name: "Voltas Ltd.", cap: "mid", sector: "Consumer Durables", price: 984.50, changes: { "1w": 0.95, "1m": 6.3, "3m": 15.6 } }
        };

        // Initialize sectors dynamically
        function initSectors() {
            const sectors = new Set();
            Object.values(stockData).forEach(s => sectors.add(s.sector));
            const select = document.getElementById('sector-filter');
            sectors.forEach(sector => {
                const opt = document.createElement('option');
                opt.value = sector;
                opt.textContent = sector;
                select.appendChild(opt);
            });
        }

        let currentCapFilter = "small"; // Default view set to match your state image

        function setCapFilter(capValue) {
            currentCapFilter = capValue;
            document.querySelectorAll('.cap-btn').forEach(btn => {
                if (btn.getAttribute('data-cap') === capValue) {
                    btn.className = "cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-emerald-500 text-white font-semibold cursor-pointer shadow-lg shadow-emerald-950";
                } else {
                    btn.className = "cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer";
                }
            });
            filterStocks();
        }

        // Logic processing filters simultaneously
        function filterStocks() {
            const sectorFilter = document.getElementById('sector-filter').value;
            const priceFilter = document.getElementById('price-filter').value;
            const horizon = document.getElementById('horizon-filter').value;
            const grid = document.getElementById('stock-grid');
            
            grid.innerHTML = '';

            Object.entries(stockData).forEach(([ticker, data]) => {
                // 1. Cap Filter
                if (currentCapFilter !== 'all' && data.cap !== currentCapFilter) return;
                
                // 2. Sector Filter
                if (sectorFilter !== 'all' && data.sector !== sectorFilter) return;
                
                // 3. Price Filter (Requested bounds)
                const price = data.price;
                if (priceFilter !== 'all') {
                    if (priceFilter === 'under100' && price >= 100) return;
                    if (priceFilter === '100-250' && (price < 100 || price > 250)) return;
                    if (priceFilter === '250-500' && (price < 250 || price > 500)) return;
                    if (priceFilter === '500-1000' && (price < 500 || price > 1000)) return;
                    if (priceFilter === '1000-2500' && (price < 1000 || price > 2500)) return;
                    if (priceFilter === 'over2500' && price <= 2500) return;
                }

                // Append card to template view
                const pct = data.changes[horizon];
                const isPos = pct >= 0;
                const card = document.createElement('div');
                card.className = "bg-zinc-900/40 border border-zinc-800/80 rounded-xl p-4 flex items-center justify-between hover:border-zinc-700 hover:bg-zinc-900/80 transition-all duration-300 cursor-pointer group shadow-md";
                card.setAttribute('onclick', `openWorkspace('${ticker}')`);
                
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold text-sm tracking-wide text-zinc-200 group-hover:text-emerald-400 transition-colors">${ticker}</h3>
                        <p class="text-[11px] text-zinc-500 truncate max-w-[150px] mt-0.5">${data.name}</p>
                        <span class="inline-block mt-2 text-[10px] px-2 py-0.5 rounded bg-zinc-950 border border-zinc-800 text-zinc-400 font-mono capitalize">
                            ${data.cap} Cap • ${data.sector}
                        </span>
                    </div>
                    <div class="text-right">
                        <span class="inline-block px-2.5 py-1 rounded-lg text-xs font-bold font-mono ${isPos ? 'bg-emerald-950/80 text-emerald-400 border border-emerald-900' : 'bg-rose-950/80 text-rose-400 border border-rose-900'}">
                            ${isPos ? '+' : ''}${pct}%
                        </span>
                        <p class="text-xs font-mono text-zinc-400 mt-1.5">₹${price.toLocaleString('en-IN')}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Generate customized terminal live context news streams
        function getMockNews(ticker) {
            return [
                { source: "Bloomberg Quint", time: "2h ago", title: `${ticker} volume breakouts cross 50-day SMA baseline benchmarks.` },
                { source: "MoneyControl", time: "5h ago", title: `Institutional blocks record key momentum shifts for ${ticker} this quarter.` },
                { source: "Economic Times", time: "1d ago", title: `Sector distribution dynamics show macro shifts tailing ${ticker}.` }
            ];
        }

        // Initialize active chart decoder (TradingView gauge snippet)
        function initDecoderGauge(ticker) {
            const targetContainer = document.getElementById('tv-decoder-container');
            if (!targetContainer) return;
            targetContainer.innerHTML = ''; // clear

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            script.async = true;
            script.text = JSON.stringify({
                "interval": "1D",
                "width": "100%",
                "isTransparent": true,
                "height": "100%",
                "symbol": `NSE:${ticker}`,
                "showIntervalTabs": true,
                "displayMode": "single",
                "locale": "en",
                "colorTheme": "dark"
            });
            targetContainer.appendChild(script);
        }

        // Main overlay split panel workspace routing
        window.openWorkspace = function(ticker) {
            const details = stockData[ticker];
            const overlay = document.getElementById('workspace-overlay');
            overlay.className = "fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-0 sm:p-4 backdrop-blur-md";
            
            overlay.innerHTML = `
                <div class="w-full h-full bg-zinc-950 sm:rounded-2xl border border-zinc-800 flex flex-col font-mono text-zinc-300 overflow-hidden shadow-2xl">
                    <!-- Top Workspace Bar -->
                    <div class="flex items-center justify-between px-6 py-3 bg-zinc-900/90 border-b border-zinc-800">
                        <div class="flex items-center gap-3">
                            <span class="text-emerald-400 font-bold text-sm">■ WORKSPACE: ${ticker}</span>
                            <span class="hidden md:inline-block text-[11px] bg-zinc-950 px-2 py-0.5 rounded text-zinc-400 border border-zinc-800">${details.name}</span>
                        </div>
                        <button onclick="closeWorkspace()" class="text-zinc-400 hover:text-white transition-colors bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-md text-xs border border-zinc-700 cursor-pointer">
                            ✕ Close Workspace
                        </button>
                    </div>
                    
                    <!-- Core Multi-Grid Workspace Split -->
                    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 overflow-hidden">
                        
                        <!-- Main Frame Layer: Advanced Interactive TradingView Chart Grid -->
                        <div class="lg:col-span-2 p-4 flex flex-col h-full border-r border-zinc-800 bg-black">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[10px] tracking-wider text-zinc-500 uppercase font-bold flex items-center gap-1.5">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span> Live interactive engine
                                </span>
                            </div>
                            <div id="tv-chart-frame" class="flex-1 w-full bg-zinc-900/20 rounded-xl overflow-hidden border border-zinc-800/80"></div>
                        </div>
                        
                        <!-- Contextual Dynamic Panels Side Stack (Tabs System) -->
                        <div class="p-4 flex flex-col h-full overflow-hidden bg-zinc-950">
                            <!-- Tab Headers -->
                            <div class="flex border-b border-zinc-800 mb-4">
                                <button id="btn-tab-news" onclick="toggleWorkspaceTab('news', '${ticker}')" class="flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-emerald-500 text-emerald-400 transition-all cursor-pointer">
                                    📰 News Feed
                                </button>
                                <button id="btn-tab-decoder" onclick="toggleWorkspaceTab('decoder', '${ticker}')" class="flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer">
                                    📊 Chart Decoder
                                </button>
                            </div>
                            
                            <!-- News Stream Layout Layer -->
                            <div id="panel-tab-news" class="flex-1 flex flex-col space-y-3 overflow-y-auto pr-1">
                                ${getMockNews(ticker).map(news => `
                                    <div class="bg-zinc-900/40 border border-zinc-800 p-3 rounded-lg hover:border-zinc-700 transition-all">
                                        <div class="flex justify-between items-center text-[10px] text-zinc-500 mb-1">
                                            <span class="text-emerald-500/80 font-bold">${news.source}</span>
                                            <span>${news.time}</span>
                                        </div>
                                        <p class="text-xs text-zinc-300 leading-relaxed">${news.title}</p>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <!-- Interactive Free Analytics Chart Decoder Layer (Hidden by default) -->
                            <div id="panel-tab-decoder" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 p-3 overflow-hidden">
                                <div id="tv-decoder-container" class="w-full h-full min-h-[340px]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;

            // Load interactive TradingView Chart Engine Instance
            setTimeout(() => {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": `NSE:${ticker}`,
                    "interval": "D",
                    "timezone": "Asia/Kolkata",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tv-chart-frame"
                });
            }, 50);
        };

        // Reactive navigation switching tabs natively
        window.toggleWorkspaceTab = function(activeTab, ticker) {
            const btnNews = document.getElementById('btn-tab-news');
            const btnDecoder = document.getElementById('btn-tab-decoder');
            const panelNews = document.getElementById('panel-tab-news');
            const panelDecoder = document.getElementById('panel-tab-decoder');

            if (activeTab === 'news') {
                btnNews.className = "flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-emerald-500 text-emerald-400 transition-all cursor-pointer";
                btnDecoder.className = "flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer";
                panelNews.classList.remove('hidden');
                panelDecoder.classList.add('hidden');
            } else {
                btnDecoder.className = "flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-emerald-500 text-emerald-400 transition-all cursor-pointer";
                btnNews.className = "flex-1 pb-2 text-center text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer";
                panelNews.classList.add('hidden');
                panelDecoder.classList.remove('hidden');
                // Construct dynamic gauge analysis widget
                initDecoderGauge(ticker);
            }
        };

        window.closeWorkspace = function() {
            document.getElementById('workspace-overlay').classList.add('hidden');
            document.getElementById('workspace-overlay').innerHTML = '';
        };

        // App Boot configuration scripts
        initSectors();
        filterStocks();
    </script>
</body>
</html>
