<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Stock Screener & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans min-h-screen flex flex-col selection:bg-zinc-800 selection:text-zinc-200">

    <div class="flex-1 flex flex-col max-w-[1300px] w-full mx-auto p-4 md:p-6 space-y-4 overflow-hidden">

        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-3 border-b border-zinc-800 gap-3 shrink-0">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-zinc-100 flex items-center gap-2">
                    <span>📈</span> DYNAMIC MARKET SCREENER
                </h1>
                <p class="text-sm text-zinc-500 mt-1 font-mono" id="all-directory-count">INITIALIZING DATA ENGINE...</p>
            </div>
            <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-xl font-mono text-xs text-zinc-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>BHAVCOPY SYNCED</span>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="shrink-0">
            <input type="text" id="search-input" oninput="loadView(currentView)" placeholder="🔍 Search by symbol or company name..."
                   class="w-full bg-zinc-900 border border-zinc-800 text-sm rounded-xl px-4 py-3.5 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-sky-700 font-mono transition-colors">
        </div>

        <!-- VIEW TABS -->
        <div class="flex flex-col gap-3 shrink-0 bg-zinc-950 p-3 rounded-xl border border-zinc-900">
            <div class="flex items-center gap-2 w-full overflow-x-auto pb-1">
                <button onclick="loadView('momentum')" id="btn-view-momentum" class="px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">🚀 MOMENTUM</button>
                <button onclick="loadView('traded')" id="btn-view-traded" class="px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">🔥 MOST TRADED</button>
                <button onclick="loadView('bullish')" id="btn-view-bullish" class="px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">📈 TOP GAINERS</button>
                <button onclick="loadView('bearish')" id="btn-view-bearish" class="px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">📉 TOP LOSERS</button>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 border-t border-zinc-900 pt-3">
                <!-- CAP FILTER -->
                <div class="flex items-center gap-2 overflow-x-auto">
                    <span class="text-[11px] text-zinc-600 font-bold uppercase shrink-0 font-mono">Cap:</span>
                    <button onclick="setCapFilter('ALL')" id="btn-cap-ALL" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">All</button>
                    <button onclick="setCapFilter('LargeCap')" id="btn-cap-LargeCap" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Large</button>
                    <button onclick="setCapFilter('MidCap')" id="btn-cap-MidCap" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Mid</button>
                    <button onclick="setCapFilter('SmallCap')" id="btn-cap-SmallCap" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">Small</button>
                </div>

                <!-- PRICE FILTER -->
                <div class="flex items-center gap-2 overflow-x-auto">
                    <span class="text-[11px] text-zinc-600 font-bold uppercase shrink-0 font-mono">Price:</span>
                    <button onclick="setPriceFilter('ALL')" id="btn-price-ALL" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap">All</button>
                    <button onclick="setPriceFilter('LT100')" id="btn-price-LT100" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">&lt;100</button>
                    <button onclick="setPriceFilter('100-250')" id="btn-price-100-250" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">100-250</button>
                    <button onclick="setPriceFilter('250-500')" id="btn-price-250-500" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">250-500</button>
                    <button onclick="setPriceFilter('500-1000')" id="btn-price-500-1000" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">500-1000</button>
                    <button onclick="setPriceFilter('GT1000')" id="btn-price-GT1000" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap">&gt;1000</button>
                </div>
            </div>
            <p id="cap-filter-note" class="hidden text-[11px] text-amber-500/80 font-mono">📎 Large/Mid/Small filtering needs one extra file (data/market-cap.csv) — ask your assistant how to add it.</p>
        </div>

        <div class="flex-1 overflow-y-auto bg-zinc-950 border border-zinc-900 rounded-xl p-4 shadow-xl">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3" id="stock-directory-list">
                </div>
        </div>
    </div>

    <div id="workspace-overlay" class="hidden fixed inset-0 bg-black/90 z-50 p-0 sm:p-4 backdrop-blur-md"></div>

    <script>
        // historicalData: { TICKER: [ {date, open, high, low, close, prevClose, volume}, ... ] } sorted oldest -> newest
        let historicalData = {};
        let stockNames = {};      // TICKER -> full company name (from FinInstrmNm)
        let marketCapMap = {};    // TICKER -> 'LargeCap' | 'MidCap' | 'SmallCap' (optional, from data/market-cap.csv)
        let stockData = {};       // TICKER -> latest snapshot + computed momentum indicators
        let availableDates = [];
        let currentView = 'momentum';
        let capFilter = 'ALL';
        let priceFilter = 'ALL';

        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveMarketData();
        });

        // ---------------------------------------------------------
        // DATA LOADING
        // ---------------------------------------------------------
        async function fetchLiveMarketData() {
            const statusEl = document.getElementById('all-directory-count');
            try {
                statusEl.innerText = 'LOADING DATE INDEX...';

                const datesResp = await fetch('data/dates.json');
                if (!datesResp.ok) throw new Error("Could not find data/dates.json");
                availableDates = await datesResp.json();
                availableDates.sort();
                if (availableDates.length === 0) throw new Error("data/dates.json is empty");

                // Optional: market cap classification (Large/Mid/Small). Silently skipped if not present.
                try {
                    const capResp = await fetch('data/market-cap.csv');
                    if (capResp.ok) {
                        const capText = await capResp.text();
                        const parsedCap = Papa.parse(capText, { header: true, skipEmptyLines: true });
                        parsedCap.data.forEach(row => {
                            const sym = (row['Symbol'] || row['SYMBOL'] || '').trim().toUpperCase();
                            const cat = (row['Category'] || row['CATEGORY'] || '').trim();
                            if (sym && cat) marketCapMap[sym] = cat;
                        });
                    }
                } catch (e) { /* optional file - fine if missing */ }

                historicalData = {};
                stockNames = {};
                let completed = 0;
                const total = availableDates.length;

                const fetchPromises = availableDates.map(date =>
                    fetch(`data/bhavcopy/${date}.csv`)
                        .then(r => r.ok ? r.text() : null)
                        .catch(() => null)
                        .then(text => {
                            completed++;
                            statusEl.innerText = `LOADING HISTORICAL DATA... ${completed}/${total} SESSIONS`;
                            return { date, text };
                        })
                );

                const results = await Promise.all(fetchPromises);

                results.forEach(({ date, text }) => {
                    if (!text) return;
                    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

                    parsed.data.forEach(row => {
                        if (row['SctySrs'] !== 'EQ') return; // mainboard equity only

                        const ticker = row['TckrSymb'];
                        if (!ticker) return;

                        const close = parseFloat(row['ClsPric'] || 0);
                        const open = parseFloat(row['OpnPric'] || 0);
                        const high = parseFloat(row['HghPric'] || 0);
                        const low = parseFloat(row['LwPric'] || 0);
                        const prevClose = parseFloat(row['PrvsClsgPric'] || close);
                        const volume = parseFloat(row['TtlTradgVol'] || row['TOTTRDQTY'] || row['TotTrdQty'] || 0);

                        if (!close) return;

                        if (!historicalData[ticker]) historicalData[ticker] = [];
                        historicalData[ticker].push({ date, open, high, low, close, prevClose, volume });

                        if (row['FinInstrmNm']) stockNames[ticker] = row['FinInstrmNm'];
                    });
                });

                Object.keys(historicalData).forEach(t => {
                    historicalData[t].sort((a, b) => a.date.localeCompare(b.date));
                });

                buildMomentumSnapshot();

                if (Object.keys(marketCapMap).length === 0) {
                    ['LargeCap', 'MidCap', 'SmallCap'].forEach(c => {
                        const btn = document.getElementById(`btn-cap-${c}`);
                        if (btn) {
                            btn.disabled = true;
                            btn.title = 'Add data/market-cap.csv to enable this filter';
                            btn.classList.add('opacity-30', 'cursor-not-allowed');
                        }
                    });
                    document.getElementById('cap-filter-note').classList.remove('hidden');
                }

                loadView('momentum');
                statusEl.innerText = `SYSTEM READY: TRACKING ${Object.keys(stockData).length} EQUITIES ACROSS ${availableDates.length} SESSIONS`;

            } catch (e) {
                console.error("Data Load Failed:", e);
                statusEl.innerText = `DATA LOAD FAILED: ${e.message}`;
            }
        }

        // ---------------------------------------------------------
        // INDICATOR MATH
        // ---------------------------------------------------------
        function calcSMA(values, period) {
            if (values.length < period) return null;
            const slice = values.slice(-period);
            return slice.reduce((s, v) => s + v, 0) / period;
        }

        function calcRSI(closes, period = 14) {
            if (closes.length < period + 1) return null;
            let gains = 0, losses = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) gains += diff; else losses += Math.abs(diff);
            }
            const avgGain = gains / period, avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calcROC(closes, period) {
            if (closes.length < period + 1) return null;
            const past = closes[closes.length - 1 - period];
            const now = closes[closes.length - 1];
            if (!past) return null;
            return ((now - past) / past) * 100;
        }

        function computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price, volSurge }) {
            let score = 0;
            const reasons = [];

            if (roc5 !== null) {
                score += Math.max(0, Math.min(25, roc5 * 2.5));
                if (roc5 > 3) reasons.push(`Up ${roc5.toFixed(1)}% over the last 5 sessions`);
                if (roc5 < -3) reasons.push(`Down ${Math.abs(roc5).toFixed(1)}% over the last 5 sessions`);
            }
            if (roc10 !== null && roc10 > 0) {
                score += Math.max(0, Math.min(15, roc10 * 1.2));
            }
            if (sma20 !== null && price) {
                if (price > sma20) { score += 15; reasons.push('Price is above its 20-day average'); }
                if (sma20Prev !== null && sma20 > sma20Prev) { score += 10; reasons.push('20-day average is trending upward'); }
            }
            if (rsi14 !== null) {
                if (rsi14 >= 50 && rsi14 <= 70) { score += 20; reasons.push(`RSI ${rsi14.toFixed(0)} — healthy momentum zone`); }
                else if (rsi14 > 70 && rsi14 <= 80) { score += 10; reasons.push(`RSI ${rsi14.toFixed(0)} — strong, getting stretched`); }
                else if (rsi14 > 80) { reasons.push(`RSI ${rsi14.toFixed(0)} — overbought, caution`); }
                else if (rsi14 >= 30 && rsi14 < 50) { score += 8; }
                else { reasons.push(`RSI ${rsi14.toFixed(0)} — weak / oversold`); }
            }
            if (volSurge !== null) {
                if (volSurge > 1.5) { score += 15; reasons.push(`Volume ${volSurge.toFixed(1)}x above its recent average`); }
                else if (volSurge > 1.2) { score += 8; }
            }

            score = Math.max(0, Math.min(100, Math.round(score)));
            if (reasons.length === 0) reasons.push('Not enough recent movement to flag anything notable');
            return { score, reasons };
        }

        function getVerdict(score) {
            if (score >= 65) return { label: 'BUY', text: 'text-emerald-400', badge: 'bg-emerald-950 text-emerald-400 border-emerald-800' };
            if (score >= 40) return { label: 'HOLD', text: 'text-amber-400', badge: 'bg-amber-950 text-amber-400 border-amber-800' };
            return { label: 'AVOID', text: 'text-rose-400', badge: 'bg-rose-950 text-rose-400 border-rose-800' };
        }

        function buildMomentumSnapshot() {
            stockData = {};
            Object.keys(historicalData).forEach(ticker => {
                const hist = historicalData[ticker];
                if (hist.length < 2) return;

                const closes = hist.map(h => h.close);
                const volumes = hist.map(h => h.volume);
                const latest = hist[hist.length - 1];
                const prev = hist[hist.length - 2];

                const change = prev.close > 0 ? ((latest.close - prev.close) / prev.close) * 100 : 0;
                const roc5 = calcROC(closes, 5);
                const roc10 = calcROC(closes, 10);
                const roc20 = calcROC(closes, 20);
                const sma20 = calcSMA(closes, 20);
                const sma20Prev = closes.length >= 25 ? calcSMA(closes.slice(0, -5), 20) : null;
                const rsi14 = calcRSI(closes, 14);
                const avgVol20 = calcSMA(volumes.slice(0, -1), Math.min(20, volumes.length - 1)) || null;
                const volSurge = avgVol20 && avgVol20 > 0 ? latest.volume / avgVol20 : null;

                const { score, reasons } = computeMomentumScore({ roc5, roc10, rsi14, sma20, sma20Prev, price: latest.close, volSurge });

                stockData[ticker] = {
                    symbol: ticker,
                    name: stockNames[ticker] || ticker,
                    price: latest.close,
                    dayHigh: latest.high,
                    dayLow: latest.low,
                    volume: latest.volume,
                    change,
                    roc5, roc10, roc20, rsi14, sma20, volSurge,
                    momentumScore: score,
                    reasons,
                    capCategory: marketCapMap[ticker] || null,
                    sessionsTracked: hist.length
                };
            });
        }

        // ---------------------------------------------------------
        // FILTER STATE
        // ---------------------------------------------------------
        window.setCapFilter = function(val) {
            capFilter = val;
            ['ALL', 'LargeCap', 'MidCap', 'SmallCap'].forEach(c => {
                const btn = document.getElementById(`btn-cap-${c}`);
                if (!btn || btn.disabled) return;
                btn.className = c === val
                    ? "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap"
                    : "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap";
            });
            loadView(currentView);
        };

        window.setPriceFilter = function(val) {
            priceFilter = val;
            ['ALL', 'LT100', '100-250', '250-500', '500-1000', 'GT1000'].forEach(p => {
                const btn = document.getElementById(`btn-price-${p}`);
                if (!btn) return;
                btn.className = p === val
                    ? "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap"
                    : "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap";
            });
            loadView(currentView);
        };

        function matchesPriceFilter(price) {
            switch (priceFilter) {
                case 'LT100': return price < 100;
                case '100-250': return price >= 100 && price < 250;
                case '250-500': return price >= 250 && price < 500;
                case '500-1000': return price >= 500 && price < 1000;
                case 'GT1000': return price >= 1000;
                default: return true;
            }
        }

        // ---------------------------------------------------------
        // RENDERING
        // ---------------------------------------------------------
        window.loadView = function(viewType) {
            currentView = viewType;
            const searchVal = document.getElementById('search-input').value.toUpperCase().trim();
            const container = document.getElementById('stock-directory-list');
            container.innerHTML = '';

            const allTabs = ['momentum', 'traded', 'bullish', 'bearish'];
            allTabs.forEach(v => {
                const btn = document.getElementById(`btn-view-${v}`);
                if (btn) {
                    btn.className = (viewType === v && !searchVal)
                        ? "px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700 whitespace-nowrap"
                        : "px-4 py-2.5 rounded-lg text-xs sm:text-sm font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300 whitespace-nowrap";
                }
            });

            let keys = Object.keys(stockData);

            if (capFilter !== 'ALL') keys = keys.filter(k => stockData[k].capCategory === capFilter);
            if (priceFilter !== 'ALL') keys = keys.filter(k => matchesPriceFilter(stockData[k].price));

            if (searchVal) {
                keys = keys.filter(k => k.includes(searchVal) || (stockData[k].name || '').toUpperCase().includes(searchVal));
            } else {
                if (viewType === 'momentum') keys.sort((a, b) => stockData[b].momentumScore - stockData[a].momentumScore);
                else if (viewType === 'traded') keys.sort((a, b) => stockData[b].volume - stockData[a].volume);
                else if (viewType === 'bullish') keys.sort((a, b) => stockData[b].change - stockData[a].change);
                else if (viewType === 'bearish') keys.sort((a, b) => stockData[a].change - stockData[b].change);
            }

            if (keys.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center font-mono text-sm text-zinc-700 py-10">No stocks match your filters</div>`;
                return;
            }

            keys.slice(0, 60).forEach((ticker, index) => {
                const data = stockData[ticker];
                const changeColor = data.change >= 0 ? "text-emerald-500" : "text-rose-500";
                const changeSign = data.change >= 0 ? "+" : "";
                const verdict = getVerdict(data.momentumScore);

                let volDisplay = data.volume > 1000000 ? (data.volume / 1000000).toFixed(1) + 'M Vol' : (data.volume / 1000).toFixed(0) + 'K Vol';
                if (data.volume === 0) volDisplay = '';

                const div = document.createElement('div');
                div.className = `p-4 bg-zinc-900/40 border border-zinc-800/80 rounded-xl hover:border-zinc-500 cursor-pointer transition-all flex flex-col justify-between shadow-sm hover:shadow-md group relative`;
                div.onclick = () => openWorkspace(ticker);

                let rankBadge = (!searchVal) ? `<span class="absolute -top-2 -left-2 bg-zinc-800 text-zinc-400 text-[10px] px-1.5 py-0.5 rounded border border-zinc-700 font-bold">#${index + 1}</span>` : '';

                div.innerHTML = `
                    ${rankBadge}
                    <div class="flex justify-between items-start font-mono mb-3 gap-2">
                        <div class="min-w-0">
                            <div class="text-base font-bold text-zinc-100 group-hover:text-sky-400 transition-colors">${ticker}</div>
                            <div class="text-[11px] text-zinc-500 truncate" title="${data.name}">${data.name}</div>
                            <div class="text-[10px] font-bold mt-1.5 inline-block px-1.5 py-0.5 rounded border ${verdict.badge}">${verdict.label} · ${data.momentumScore}</div>
                        </div>
                        <div class="text-xs ${changeColor} font-bold bg-zinc-950 px-2 py-1 rounded border border-zinc-800 shrink-0">
                            ${changeSign}${data.change.toFixed(2)}%
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-end font-mono">
                             <div class="text-[10px] text-zinc-500 tracking-wider">${volDisplay}</div>
                             <div class="text-base font-bold text-zinc-100">₹${data.price.toLocaleString('en-IN', {minimumFractionDigits: 2})}</div>
                        </div>
                        <div class="text-[10px] text-zinc-600 font-mono">H ₹${data.dayHigh.toFixed(2)} &nbsp;·&nbsp; L ₹${data.dayLow.toFixed(2)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        // ---------------------------------------------------------
        // WORKSPACE OVERLAY
        // ---------------------------------------------------------
        window.openWorkspace = function(ticker) {
            const data = stockData[ticker];
            const overlay = document.getElementById('workspace-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex', 'items-center', 'justify-center');

            const cleanTicker = ticker.split('.')[0].replace(/\s+/g, '').toUpperCase();
            const verdict = getVerdict(data.momentumScore);
            const fmt = (v, suffix = '%') => v === null || v === undefined ? 'N/A' : v.toFixed(2) + suffix;

            overlay.innerHTML = `
                <div class="w-full h-full bg-zinc-950 sm:rounded-2xl border border-zinc-800 flex flex-col font-mono text-zinc-300 overflow-hidden shadow-2xl">
                    <div class="flex items-center justify-between px-6 py-3 bg-zinc-900/90 border-b border-zinc-800 shrink-0">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-sky-400 font-bold text-base shrink-0">■ ${cleanTicker}</span>
                            <span class="text-zinc-500 text-xs truncate hidden sm:inline">${data.name}</span>
                            <span class="text-[11px] font-bold px-2 py-0.5 rounded border ${verdict.badge} shrink-0">${verdict.label}</span>
                        </div>
                        <button onclick="closeWorkspace()" class="text-zinc-400 hover:text-white transition-colors bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-md text-xs border border-zinc-700 cursor-pointer shrink-0">✕ Close</button>
                    </div>
                    
                    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 overflow-hidden">
                        <div class="lg:col-span-2 p-4 flex flex-col h-full border-r border-zinc-800 bg-black">
                            <div id="tv-chart-frame" class="flex-1 w-full bg-zinc-900/20 rounded-xl overflow-hidden border border-zinc-800/80"></div>
                        </div>
                        
                        <div class="p-4 flex flex-col h-full overflow-hidden bg-zinc-950">
                            <div class="flex flex-wrap border-b border-zinc-800 mb-4 shrink-0 text-xs">
                                <button id="btn-tab-momentum" onclick="toggleWorkspaceTab('momentum', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-sky-500 text-sky-400 transition-all cursor-pointer">🚀 Momentum</button>
                                <button id="btn-tab-decoder" onclick="toggleWorkspaceTab('decoder', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer mt-2 sm:mt-0">📊 Technical</button>
                                <button id="btn-tab-fundamentals" onclick="toggleWorkspaceTab('fundamentals', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer mt-2 sm:mt-0">🏦 Fundamentals</button>
                                <button id="btn-tab-news" onclick="toggleWorkspaceTab('news', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer mt-2 sm:mt-0">📰 News</button>
                            </div>
                            
                            <div id="panel-tab-momentum" class="flex-1 flex flex-col overflow-y-auto pr-1">
                                <div class="bg-zinc-900/60 p-4 rounded-lg border border-zinc-800 mb-3">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-zinc-500 uppercase text-[11px]">Momentum Score</span>
                                        <span class="text-[11px] font-bold ${verdict.text}">${verdict.label}</span>
                                    </div>
                                    <div class="text-2xl font-bold ${verdict.text}">${data.momentumScore} / 100</div>
                                    <div class="text-[10px] text-zinc-600 mt-1">Rule-based signal from price data only — not financial advice.</div>
                                </div>

                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">EOD Price</span>
                                    <span class="text-zinc-100 font-bold">₹${data.price.toLocaleString('en-IN')}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">Day Range</span>
                                    <span class="text-zinc-100 font-bold">₹${data.dayLow.toFixed(2)} - ₹${data.dayHigh.toFixed(2)}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">1D Change</span>
                                    <span class="${data.change >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-bold">${fmt(data.change)}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">5 / 10 / 20-Day ROC</span>
                                    <span class="text-zinc-100 font-bold">${fmt(data.roc5)} / ${fmt(data.roc10)} / ${fmt(data.roc20)}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">RSI (14)</span>
                                    <span class="text-zinc-100 font-bold">${data.rsi14 !== null ? data.rsi14.toFixed(1) : 'N/A'}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">Volume vs 20-Day Avg</span>
                                    <span class="text-zinc-100 font-bold">${data.volSurge !== null ? data.volSurge.toFixed(2) + 'x' : 'N/A'}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs mb-3 flex justify-between">
                                    <span class="text-zinc-500 uppercase">Total Volume</span>
                                    <span class="text-zinc-100 font-bold">${data.volume.toLocaleString('en-IN')}</span>
                                </div>
                                <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-xs">
                                    <span class="text-zinc-500 uppercase block mb-2">Why this score</span>
                                    <ul class="space-y-1">
                                        ${data.reasons.map(r => `<li class="text-zinc-300 text-[11px]">• ${r}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>

                            <div id="panel-tab-decoder" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 p-3 overflow-hidden">
                                <div id="tv-decoder-container" class="w-full h-full min-h-[340px]"></div>
                            </div>

                            <div id="panel-tab-fundamentals" class="flex-1 hidden flex-col items-center justify-center text-center p-6">
                                <div class="text-3xl mb-2">🏗️</div>
                                <div class="text-sm text-zinc-400 font-mono">Fundamental data (P/E, ROE, Debt/Equity) isn't wired up yet.</div>
                                <div class="text-[11px] text-zinc-600 font-mono mt-2">Coming in the next build step.</div>
                            </div>

                            <div id="panel-tab-news" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 overflow-hidden relative">
                                <div id="tv-news-container" class="w-full h-full overflow-y-auto absolute inset-0"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            setTimeout(() => {
                new TradingView.widget({
                    "autosize": true, 
                    "symbol": `BSE:${cleanTicker}`, 
                    "interval": "D", 
                    "timezone": "Asia/Kolkata", 
                    "theme": "dark", 
                    "style": "1",
                    "locale": "en", 
                    "enable_publishing": false, 
                    "hide_side_toolbar": false, 
                    "allow_symbol_change": true, 
                    "container_id": "tv-chart-frame"
                });
            }, 50);
        };

        window.closeWorkspace = function() {
            const overlay = document.getElementById('workspace-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex', 'items-center', 'justify-center');
            overlay.innerHTML = '';
        };

        window.toggleWorkspaceTab = function(activeTab, ticker) {
            const tabs = ['momentum', 'decoder', 'fundamentals', 'news'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`btn-tab-${tab}`);
                const panel = document.getElementById(`panel-tab-${tab}`);
                if (tab === activeTab) {
                    btn.className = btn.className.replace('border-transparent', 'border-sky-500').replace('text-zinc-500', 'text-sky-400');
                    panel.classList.remove('hidden'); panel.classList.add('flex');
                } else {
                    btn.className = btn.className.replace('border-sky-500', 'border-transparent').replace('text-sky-400', 'text-zinc-500');
                    panel.classList.add('hidden'); panel.classList.remove('flex');
                }
            });

            if (activeTab === 'decoder') {
                const container = document.getElementById('tv-decoder-container');
                if (container && container.innerHTML.trim() === '') {
                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js'; script.async = true;
                    script.text = JSON.stringify({ "interval": "1D", "width": "100%", "isTransparent": true, "height": "100%", "symbol": `BSE:${ticker}`, "showIntervalTabs": true, "displayMode": "single", "locale": "en", "colorTheme": "dark" });
                    container.appendChild(script);
                }
            }
            
            if (activeTab === 'news') {
                const container = document.getElementById('tv-news-container');
                if (container && container.innerHTML.trim() === '') {
                    container.innerHTML = `<div class="p-6 text-center text-zinc-500 text-xs font-mono animate-pulse">📡 Scanning dynamic news matrix for ${ticker}...</div>`;
                    fetchLiveNews(ticker, container);
                }
            }
        };

        async function fetchLiveNews(ticker, container) {
            try {
                const query = encodeURIComponent(`${ticker} stock India news`);
                const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=en-IN&gl=IN&ceid=IN:en`);
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "ok" && data.items && data.items.length > 0) {
                    let html = '<div class="p-3 flex flex-col gap-3 pb-8">';
                    data.items.slice(0, 10).forEach(item => {
                        const source = item.source || 'Market Update';
                        const pubDate = new Date(item.pubDate);
                        const dateString = pubDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

                        html += `
                            <a href="${item.link}" target="_blank" class="block bg-zinc-900/60 hover:bg-zinc-800/90 border border-zinc-800/80 p-3.5 rounded-xl transition-all duration-200 group shadow-md">
                                <h4 class="text-xs font-semibold text-zinc-200 group-hover:text-sky-400 mb-2 leading-relaxed">${item.title}</h4>
                                <div class="flex justify-between items-center mt-2 border-t border-zinc-800/40 pt-2 font-mono text-[10px] text-zinc-500">
                                    <span class="uppercase tracking-wider font-bold">${source}</span>
                                    <span>${dateString}</span>
                                </div>
                            </a>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="p-6 text-center text-zinc-500 text-xs font-mono">No localized stock news tiles available.</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="p-6 text-center text-rose-500 text-xs font-mono">⚠️ Telemetry error parsing feed sync.</div>';
            }
        }
    </script>
</body>
</html>
