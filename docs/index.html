<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBK NiftyPulse Scanner</title>
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        body { background-color: #000; color: #e4e4e7; font-family: sans-serif; }
    </style>
</head>
<body class="selection:bg-emerald-500/30 selection:text-emerald-400">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="text-center mb-8 flex flex-col items-center justify-center">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-950/50 border border-emerald-500/30 p-2 rounded-xl shadow-inner">
                    <svg class="w-6 h-6 text-emerald-400 animate-pulse" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"></path>
                    </svg>
                </div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">
                    RBK Nifty<span class="text-emerald-400">Pulse</span> Scanner
                </h1>
            </div>
            <p class="text-[11px] text-zinc-500 font-mono mt-2 uppercase tracking-widest">Advanced Analytics Terminal</p>
        </header>

        <div class="flex flex-col lg:flex-row items-center justify-center gap-4 mb-6 border-b border-zinc-800 pb-4 font-mono">
            <div class="flex flex-wrap justify-center gap-2.5 w-full lg:w-auto">
                <button id="nav-allstocks" onclick="switchGlobalView('allstocks')" class="px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border border-sky-500/40 bg-sky-950/30 text-sky-400 shadow-md transition-all cursor-pointer">🔍 All Stocks Directory</button>
                <button id="nav-momentum" onclick="switchGlobalView('momentum')" class="px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border border-zinc-800 text-zinc-400 hover:bg-zinc-900 transition-all cursor-pointer">⚡ Momentum</button>
                <button id="nav-dividend" onclick="switchGlobalView('dividend')" class="px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border border-zinc-800 text-zinc-400 hover:bg-zinc-900 transition-all cursor-pointer">💰 Dividends</button>
                <button id="nav-highrisk" onclick="switchGlobalView('highrisk')" class="px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border border-zinc-800 text-zinc-400 hover:bg-zinc-900 transition-all cursor-pointer">⚠️ High Risk High Reward</button>
            </div>
        </div>

        <div id="view-allstocks" class="block">
            <div class="flex flex-col gap-4 mb-6 bg-zinc-900/80 p-4 rounded-xl border border-zinc-800/80 backdrop-blur-sm shadow-xl">
                <div class="relative w-full">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500 font-mono text-sm">🔎</span>
                    <input type="text" id="all-search-stocks" oninput="filterAllStocks()" placeholder="Search comprehensive directory by symbol..." class="w-full bg-zinc-950 text-zinc-200 pl-10 pr-4 py-2.5 rounded-lg border border-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 font-mono transition-all">
                </div>
                <div class="flex flex-wrap items-center justify-between gap-4 border-t border-zinc-800/60 pt-3">
                    <div class="flex flex-col sm:flex-row flex-wrap gap-4 w-full lg:w-auto">
                        <div class="flex flex-wrap gap-2 bg-zinc-950/50 p-1 rounded-lg border border-zinc-800/80" id="all-trend-filters">
                            <button onclick="setAllTrendFilter('all')" data-trend="all" class="all-trend-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-sky-500/20 text-sky-400 border border-sky-500/50 cursor-pointer">All Trends</button>
                            <button onclick="setAllTrendFilter('bullish')" data-trend="bullish" class="all-trend-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-emerald-400 border border-transparent cursor-pointer">Bullish 🟢</button>
                            <button onclick="setAllTrendFilter('bearish')" data-trend="bearish" class="all-trend-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-rose-400 border border-transparent cursor-pointer">Bearish 🔴</button>
                        </div>
                        <div class="flex flex-wrap gap-2 bg-zinc-950/50 p-1 rounded-lg border border-zinc-800/80" id="all-cap-filters">
                            <button onclick="setAllCapFilter('all')" data-cap="all" class="all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-zinc-800 text-white cursor-pointer shadow-sm">All Caps</button>
                            <button onclick="setAllCapFilter('large')" data-cap="large" class="all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-white cursor-pointer">Large</button>
                            <button onclick="setAllCapFilter('mid')" data-cap="mid" class="all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-white cursor-pointer">Mid</button>
                            <button onclick="setAllCapFilter('small')" data-cap="small" class="all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-white cursor-pointer">Small</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mb-3 flex justify-between items-end">
                <span id="all-directory-count" class="text-xs font-mono text-zinc-500 tracking-wider">WAITING FOR LIVE DATA...</span>
            </div>
            <main id="all-stock-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></main>
        </div>

        <div id="view-momentum" class="hidden">
            <div class="flex flex-col gap-4 mb-6 bg-zinc-900/80 p-4 rounded-xl border border-zinc-800/80 backdrop-blur-sm shadow-xl">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex flex-wrap gap-2" id="cap-filters">
                        <button onclick="setCapFilter('all')" data-cap="all" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-emerald-500 text-white font-semibold cursor-pointer shadow-lg shadow-emerald-950">All Caps</button>
                        <button onclick="setCapFilter('large')" data-cap="large" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">Large Caps</button>
                        <button onclick="setCapFilter('mid')" data-cap="mid" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">Mid Caps</button>
                        <button onclick="setCapFilter('small')" data-cap="small" class="cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer">Small Caps</button>
                    </div>
                    <div class="flex flex-wrap gap-3 items-center w-full sm:w-auto">
                        <select id="horizon-filter" onchange="filterStocks()" class="w-full sm:w-auto bg-zinc-950 text-zinc-200 px-3 py-1.5 rounded-lg border border-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer font-mono">
                            <option value="1w">Horizon: 1 Week Perf.</option>
                            <option value="1m">Horizon: 1 Month Perf.</option>
                            <option value="3m">Horizon: 3 Months Perf.</option>
                        </select>
                    </div>
                </div>
            </div>
            <main id="stock-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></main>
        </div>

        <div id="view-dividend" class="hidden">
            <div class="bg-zinc-900/40 border border-zinc-800/80 rounded-xl p-4 sm:p-6 shadow-xl backdrop-blur-sm overflow-hidden">
                <div class="mb-4">
                    <h2 class="text-base font-bold text-emerald-400 font-mono">📋 Corporate Actions: Dividend Monitor</h2>
                </div>
                <div class="overflow-x-auto rounded-lg border border-zinc-800 bg-zinc-950">
                    <table class="w-full text-left font-mono text-xs text-zinc-300 divide-y divide-zinc-800">
                        <thead class="bg-zinc-900/80 text-zinc-400 uppercase text-[10px] tracking-wider">
                            <tr><th class="p-4">Symbol</th><th class="p-4">Company Name</th><th class="p-4 text-right">Div. Amount</th><th class="p-4 text-right">Yield (%)</th><th class="p-4 text-center">Ex-Date</th></tr>
                        </thead>
                        <tbody id="dividend-table-body" class="divide-y divide-zinc-900"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-highrisk" class="hidden">
            <div class="bg-zinc-900/40 border border-amber-500/30 rounded-xl p-4 sm:p-6 shadow-xl backdrop-blur-sm overflow-hidden">
                <div class="mb-4">
                    <h2 class="text-base font-bold text-amber-400 font-mono">⚠️ Alpha Aggressive Catalyst Radar (High Risk High Reward)</h2>
                </div>
                <div class="overflow-x-auto rounded-lg border border-zinc-800 bg-zinc-950">
                    <table class="w-full text-left font-mono text-xs text-zinc-300 divide-y divide-zinc-800">
                        <thead class="bg-zinc-900/80 text-zinc-400 uppercase text-[10px] tracking-wider">
                            <tr><th class="p-4">Symbol</th><th class="p-4">Company Name</th><th class="p-4 text-right">Price</th><th class="p-4 text-right">1M Growth</th><th class="p-4 text-center">Risk Parameter Check</th><th class="p-4 text-emerald-400 text-right">Target Multiplier</th></tr>
                        </thead>
                        <tbody id="highrisk-table-body" class="divide-y divide-zinc-900"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="workspace-overlay" class="hidden"></div>

    <script>
        // =============================================================
        // CONFIGURATION: PASTE YOUR GOOGLE WEB APP URL BELOW
        // =============================================================
        const AM_SHEETS_API = "https://script.google.com/macros/s/AKfycbxRxY9_32hBEkHaOIogwndtw9dZCNQM3emTBPlxrV2GOKjsk8ZMr38_pDqVlyAC1ygYEg/exec"; // Put your actual App Script URL here

        let stockData = {};
        const horizonLabels = { "1w": "1 Week Chg", "1m": "1 Month Chg", "3m": "3 Month Chg" };
        let currentCapFilter = "all"; 
        let currentAllCapFilter = "all";
        let currentAllTrendFilter = "all"; 

        // NAVIGATION LOGIC
        window.switchGlobalView = function(view) {
            const tabs = ['allstocks', 'momentum', 'dividend', 'highrisk'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                const panel = document.getElementById(`view-${t}`);
                if (t === view) {
                    btn.className = `px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border shadow-md transition-all cursor-pointer ${view === 'allstocks' ? 'border-sky-500/40 bg-sky-950/30 text-sky-400' : view === 'highrisk' ? 'border-amber-500/40 bg-amber-950/30 text-amber-400' : 'border-emerald-500/40 bg-emerald-950/30 text-emerald-400'}`;
                    panel.classList.remove('hidden');
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-xs font-bold tracking-wider uppercase border border-zinc-800 text-zinc-400 hover:bg-zinc-900 transition-all cursor-pointer";
                    panel.classList.add('hidden');
                }
            });

            if (view === 'allstocks') filterAllStocks();
            if (view === 'momentum') filterStocks();
            if (view === 'dividend') renderDividendTable();
            if (view === 'highrisk') renderHighRiskTable();
        };

        window.setAllCapFilter = function(capValue) {
            currentAllCapFilter = capValue;
            document.querySelectorAll('.all-cap-btn').forEach(btn => {
                if (btn.getAttribute('data-cap') === capValue) {
                    btn.className = "all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-zinc-800 text-white cursor-pointer shadow-sm";
                } else {
                    btn.className = "all-cap-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 hover:text-white cursor-pointer";
                }
            });
            filterAllStocks();
        };

        window.setAllTrendFilter = function(trendValue) {
            currentAllTrendFilter = trendValue;
            document.querySelectorAll('.all-trend-btn').forEach(btn => {
                if (btn.getAttribute('data-trend') === trendValue) {
                    btn.className = "all-trend-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-sky-500/20 text-sky-400 border border-sky-500/50 cursor-pointer";
                } else {
                    const hoverColor = btn.getAttribute('data-trend') === 'bullish' ? 'hover:text-emerald-400' : 'hover:text-rose-400';
                    btn.className = `all-trend-btn px-4 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all duration-200 bg-transparent text-zinc-400 ${hoverColor} border border-transparent cursor-pointer`;
                }
            });
            filterAllStocks();
        };

        // DIRECTORY FILTERING
        window.filterAllStocks = function() {
            const searchQuery = document.getElementById('all-search-stocks').value.trim().toLowerCase();
            const grid = document.getElementById('all-stock-grid');
            const countLabel = document.getElementById('all-directory-count');
            
            grid.innerHTML = ''; 
            let matchedCount = 0;

            Object.entries(stockData).forEach(([ticker, data]) => {
                if (searchQuery && !ticker.toLowerCase().includes(searchQuery) && !data.name.toLowerCase().includes(searchQuery)) return;
                if (currentAllCapFilter !== 'all' && data.cap !== currentAllCapFilter) return;
                
                const chg1m = data.changes['1m'] || 0;
                const is1mPos = chg1m >= 0;

                if (currentAllTrendFilter === 'bullish' && !is1mPos) return;
                if (currentAllTrendFilter === 'bearish' && is1mPos) return;
                
                const price = data.price || 0;
                const card = document.createElement('div');
                const borderClass = is1mPos ? 'hover:border-emerald-500/50' : 'hover:border-rose-500/50';
                const textClass = is1mPos ? 'group-hover:text-emerald-400' : 'group-hover:text-rose-400';
                
                card.className = `bg-zinc-900/40 border border-zinc-800/80 rounded-xl p-4 flex flex-col justify-between transition-all duration-300 cursor-pointer group shadow-md ${borderClass}`;
                card.setAttribute('onclick', `openWorkspace('${ticker}')`);
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-sm tracking-wide text-zinc-200 ${textClass} transition-colors">${ticker}</h3>
                                <p class="text-[11px] text-zinc-500 truncate mt-0.5">${data.name}</p>
                                <span class="inline-block mt-2 text-[9px] px-2 py-0.5 rounded bg-zinc-950 border border-zinc-800 text-zinc-400 font-mono capitalize">
                                    ${data.cap} Cap
                                </span>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <span class="text-zinc-200 font-bold font-mono text-sm block">₹${price.toLocaleString('en-IN')}</span>
                                <div class="flex flex-col gap-1 mt-1.5 text-[9px] font-mono font-bold">
                                    <div class="flex items-center justify-end gap-1.5">
                                        <span class="text-zinc-500">1M</span>
                                        <span class="${is1mPos ? 'text-emerald-400' : 'text-rose-400'}">${is1mPos ? '+' : ''}${chg1m.toFixed(2)}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                matchedCount++;
            });
            countLabel.innerText = `DISPLAYING ${matchedCount} ASSETS`;
        };

        window.setCapFilter = function(capValue) {
            currentCapFilter = capValue;
            document.querySelectorAll('.cap-btn').forEach(btn => {
                btn.className = btn.getAttribute('data-cap') === capValue ? "cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-emerald-500 text-white font-semibold cursor-pointer shadow-lg shadow-emerald-950" : "cap-btn px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer";
            });
            filterStocks();
        };

        window.filterStocks = function() {
            const horizon = document.getElementById('horizon-filter').value;
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';

            const sortedTickers = Object.entries(stockData).sort((a, b) => (b[1].changes[horizon] || 0) - (a[1].changes[horizon] || 0));

            sortedTickers.forEach(([ticker, data]) => {
                if (currentCapFilter !== 'all' && data.cap !== currentCapFilter) return;

                const pct = data.changes[horizon] || 0;
                const isPos = pct >= 0;
                const card = document.createElement('div');
                card.className = "bg-zinc-900/40 border border-zinc-800/80 rounded-xl p-4 flex items-center justify-between hover:border-zinc-700 hover:bg-zinc-900/80 transition-all duration-300 cursor-pointer group shadow-md";
                card.setAttribute('onclick', `openWorkspace('${ticker}')`);
                
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold text-sm tracking-wide text-zinc-200 group-hover:text-emerald-400 transition-colors">${ticker}</h3>
                        <p class="text-[11px] text-zinc-500 truncate max-w-[150px] mt-0.5">${data.name}</p>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <span class="inline-block px-2.5 py-1 rounded-lg text-xs font-bold font-mono ${isPos ? 'bg-emerald-950/80 text-emerald-400 border border-emerald-900' : 'bg-rose-950/80 text-rose-400 border border-rose-900'}">
                            ${isPos ? '+' : ''}${pct.toFixed(2)}%
                        </span>
                        <span class="text-[10px] font-mono text-zinc-500 mt-1 uppercase tracking-wider">${horizonLabels[horizon]}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        window.renderDividendTable = function() {
            const container = document.getElementById('dividend-table-body');
            container.innerHTML = '';
            
            Object.entries(stockData).forEach(([ticker, data]) => {
                if(!data.divYield || data.divYield === 0) return;

                const row = document.createElement('tr');
                row.className = "hover:bg-zinc-900/50 cursor-pointer transition-colors group";
                row.setAttribute('onclick', `openWorkspace('${ticker}')`);
                row.innerHTML = `
                    <td class="p-4 font-bold text-zinc-200 group-hover:text-emerald-400 transition-colors">${ticker}</td>
                    <td class="p-4 text-zinc-400 font-sans">${data.name}</td>
                    <td class="p-4 text-right font-bold text-zinc-200">₹${data.divAmount}</td>
                    <td class="p-4 text-right text-emerald-400 font-bold">${data.divYield}%</td>
                    <td class="p-4 text-center text-zinc-500 font-mono">${data.exDate || 'N/A'}</td>
                `;
                container.appendChild(row);
            });
        };

        window.renderHighRiskTable = function() {
            const container = document.getElementById('highrisk-table-body');
            container.innerHTML = '';

            Object.entries(stockData).forEach(([ticker, data]) => {
                if (!data.riskMetrics || data.riskMetrics.threat === "N/A") return;
                const chg1m = data.changes['1m'] || 0;
                const isPos = chg1m >= 0;

                const row = document.createElement('tr');
                row.className = "hover:bg-zinc-900/50 cursor-pointer transition-colors group";
                row.setAttribute('onclick', `openWorkspace('${ticker}')`);
                row.innerHTML = `
                    <td class="p-4 font-bold text-zinc-200 group-hover:text-amber-400 transition-colors">${ticker}</td>
                    <td class="p-4 text-zinc-400 font-sans">
                        <div>${data.name}</div>
                        <div class="text-[10px] text-zinc-500 font-mono mt-0.5">Beta: ${data.riskMetrics.beta}</div>
                    </td>
                    <td class="p-4 text-right font-bold text-zinc-200">₹${data.price.toLocaleString('en-IN')}</td>
                    <td class="p-4 text-right font-bold ${isPos ? 'text-emerald-400' : 'text-rose-400'}">${isPos?'+':''}${chg1m.toFixed(2)}%</td>
                    <td class="p-4 font-mono text-[11px]">
                        <div class="text-rose-400"><span class="text-zinc-500">Risk:</span> ${data.riskMetrics.threat}</div>
                        <div class="text-emerald-400"><span class="text-zinc-500">Reward:</span> ${data.riskMetrics.award}</div>
                    </td>
                    <td class="p-4 text-right text-amber-400 font-extrabold tracking-wider animate-pulse">Review 🚀</td>
                `;
                container.appendChild(row);
            });
        };

        function generateTechnicalMarkup(ticker) {
            return `
                <div class="space-y-4 flex-1 overflow-y-auto pr-2 pb-6">
                    <div class="p-3 rounded-xl border text-center font-mono font-bold text-xs tracking-wide shrink-0 bg-zinc-900 border-zinc-800 text-zinc-400">
                        ⚖️ POSITION DATA READY
                    </div>
                    <div class="space-y-3 font-mono text-[11px]">
                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
                            <span class="text-zinc-500 block uppercase font-bold tracking-wider mb-2">⚡ Technical Notes</span>
                            <p class="text-zinc-300 leading-relaxed">Check Decoder tab for advanced metric aggregation options.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function generateFundamentalMarkup(ticker) {
            const data = stockData[ticker];
            const pe = data && data.funda && data.funda.pe ? data.funda.pe : 'N/A';
            const de = data && data.funda && data.funda.de ? data.funda.de : 'N/A';
            const yieldVal = data && data.divYield ? data.divYield + '%' : 'N/A';

            return `
                <div class="space-y-4 flex-1 overflow-y-auto pr-2 pb-6">
                    <div class="space-y-3 font-mono text-[11px]">
                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
                            <span class="text-zinc-500 block uppercase font-bold tracking-wider mb-2 flex justify-between">
                                <span>📉 Value Status (P/E)</span>
                                <span class="text-sky-400">${pe}</span>
                            </span>
                        </div>
                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
                            <span class="text-zinc-500 block uppercase font-bold tracking-wider mb-2 flex justify-between">
                                <span>💰 Income Potential (Yield)</span>
                                <span class="text-emerald-400">${yieldVal}</span>
                            </span>
                        </div>
                        <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
                            <span class="text-zinc-500 block uppercase font-bold tracking-wider mb-2 flex justify-between">
                                <span>🏛️ Financial Health (D/E)</span>
                                <span class="text-purple-400">${de}</span>
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        // WORKSPACE OVERLAY LOGIC
        window.openWorkspace = function(ticker) {
            const details = stockData[ticker] || { name: "Live Market Search", cap: "global", sector: "Equities" };
            const overlay = document.getElementById('workspace-overlay');
            overlay.className = "fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-0 sm:p-4 backdrop-blur-md";
            
            // Clean up the ticker name perfectly
            const cleanTicker = ticker.split('.')[0].replace(/\s+/g, '').toUpperCase();
            
            overlay.innerHTML = `
                <div class="w-full h-full bg-zinc-950 sm:rounded-2xl border border-zinc-800 flex flex-col font-mono text-zinc-300 overflow-hidden shadow-2xl">
                    <div class="flex items-center justify-between px-6 py-3 bg-zinc-900/90 border-b border-zinc-800">
                        <div class="flex items-center gap-3">
                            <span class="text-emerald-400 font-bold text-sm">■ WORKSPACE: ${cleanTicker}</span>
                            <span class="hidden md:inline-block text-[11px] bg-zinc-950 px-2 py-0.5 rounded text-zinc-400 border border-zinc-800">${details.name}</span>
                        </div>
                        <button onclick="closeWorkspace()" class="text-zinc-400 hover:text-white transition-colors bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-md text-xs border border-zinc-700 cursor-pointer">✕ Close</button>
                    </div>
                    
                    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 overflow-hidden">
                        <div class="lg:col-span-2 p-4 flex flex-col h-full border-r border-zinc-800 bg-black">
                            <div id="tv-chart-frame" class="flex-1 w-full bg-zinc-900/20 rounded-xl overflow-hidden border border-zinc-800/80"></div>
                        </div>
                        
                        <div class="p-4 flex flex-col h-full overflow-hidden bg-zinc-950">
                            <div class="flex flex-wrap border-b border-zinc-800 mb-4 shrink-0 text-xs">
                                <button id="btn-tab-tech" onclick="toggleWorkspaceTab('tech', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-emerald-500 text-emerald-400 transition-all cursor-pointer">💡 Tech</button>
                                <button id="btn-tab-funda" onclick="toggleWorkspaceTab('funda', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer">🏛️ Funda</button>
                                <button id="btn-tab-decoder" onclick="toggleWorkspaceTab('decoder', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer mt-2 sm:mt-0">📊 Decoder</button>
                                <button id="btn-tab-news" onclick="toggleWorkspaceTab('news', '${cleanTicker}')" class="w-1/2 sm:flex-1 pb-2 text-center font-bold uppercase tracking-wider border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-all cursor-pointer mt-2 sm:mt-0">📰 News</button>
                            </div>
                            
                            <div id="panel-tab-tech" class="flex-1 flex flex-col overflow-y-auto pr-1">
                                ${generateTechnicalMarkup(ticker)}
                            </div>

                            <div id="panel-tab-funda" class="flex-1 hidden flex-col overflow-y-auto pr-1">
                                ${generateFundamentalMarkup(ticker)}
                            </div>

                            <div id="panel-tab-decoder" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 p-3 overflow-hidden">
                                <div id="tv-decoder-container" class="w-full h-full min-h-[340px]"></div>
                            </div>

                            <div id="panel-tab-news" class="flex-1 hidden flex-col h-full bg-zinc-900/10 rounded-xl border border-zinc-800 overflow-hidden relative">
                                <div id="tv-news-container" class="w-full h-full overflow-y-auto absolute inset-0"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            // Initialize TradingView Widget safely
            setTimeout(() => {
                new TradingView.widget({
                    "autosize": true, 
                    "symbol": `BSE:${cleanTicker}`, // <--- CHANGE NSE to BSE HERE
                    "interval": "D", 
                    "timezone": "Asia/Kolkata", 
                    "theme": "dark", 
                    "style": "1",
                    "locale": "en", 
                    "enable_publishing": false, 
                    "hide_side_toolbar": false, 
                    "allow_symbol_change": true, 
                    "container_id": "tv-chart-frame"
                });
            }, 50);
        };

        window.toggleWorkspaceTab = function(activeTab, ticker) {
            const tabs = ['tech', 'funda', 'decoder', 'news'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`btn-tab-${tab}`);
                const panel = document.getElementById(`panel-tab-${tab}`);
                if (tab === activeTab) {
                    btn.className = btn.className.replace('border-transparent', 'border-emerald-500').replace('text-zinc-500', 'text-emerald-400');
                    panel.classList.remove('hidden'); panel.classList.add('flex');
                } else {
                    btn.className = btn.className.replace('border-emerald-500', 'border-transparent').replace('text-emerald-400', 'text-zinc-500');
                    panel.classList.add('hidden'); panel.classList.remove('flex');
                }
            });

            const cleanTicker = ticker.split('.')[0].replace(/\s+/g, '').toUpperCase();

            if (activeTab === 'decoder') {
                const container = document.getElementById('tv-decoder-container');
                if (container && container.innerHTML.trim() === '') {
                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js'; script.async = true;
                    // CHANGE NSE to BSE ON THE LINE BELOW:
                    script.text = JSON.stringify({ "interval": "1D", "width": "100%", "isTransparent": true, "height": "100%", "symbol": `BSE:${cleanTicker}`, "showIntervalTabs": true, "displayMode": "single", "locale": "en", "colorTheme": "dark" });
                    container.appendChild(script);
                }
            }
            
            // Native News Handler
            if (activeTab === 'news') {
                const container = document.getElementById('tv-news-container');
                if (container && container.innerHTML.trim() === '') {
                    container.innerHTML = `<div class="p-6 text-center text-zinc-500 text-xs font-mono animate-pulse">📡 Scanning dynamic news matrix for ${cleanTicker}...</div>`;
                    fetchLiveNews(cleanTicker, container);
                }
            }
        };

        window.closeWorkspace = function() {
            document.getElementById('workspace-overlay').classList.add('hidden');
            document.getElementById('workspace-overlay').innerHTML = '';
        };

        // NATIVE NEWS TILE GENERATOR
        async function fetchLiveNews(ticker, container) {
            try {
                const query = encodeURIComponent(`${ticker} stock India news`);
                const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=en-IN&gl=IN&ceid=IN:en`);
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "ok" && data.items && data.items.length > 0) {
                    let html = '<div class="p-3 flex flex-col gap-3 pb-8">';
                    
                    data.items.slice(0, 10).forEach(item => {
                        const source = item.source || 'Market Update';
                        const pubDate = new Date(item.pubDate);
                        const dateString = pubDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

                        html += `
                            <a href="${item.link}" target="_blank" class="block bg-zinc-900/60 hover:bg-zinc-800/90 border border-zinc-800/80 p-3.5 rounded-xl transition-all duration-200 group shadow-md">
                                <h4 class="text-xs font-semibold text-zinc-200 group-hover:text-emerald-400 mb-2 leading-relaxed">${item.title}</h4>
                                <div class="flex justify-between items-center mt-2 border-t border-zinc-800/40 pt-2 font-mono text-[9px] text-zinc-500">
                                    <span class="uppercase tracking-wider font-bold">${source}</span>
                                    <span>${dateString}</span>
                                </div>
                            </a>
                        `;
                    });
                    
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="p-6 text-center text-zinc-500 text-xs font-mono">No localized stock news tiles available.</div>';
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="p-6 text-center text-rose-500 text-xs font-mono">⚠️ Telemetry error parsing feed sync.</div>';
            }
        }

        // MARKET API BACKEND DATA SYNC
        async function fetchLiveMarketData() {
            try {
                document.getElementById('all-directory-count').innerText = 'SYNCING LIVE MARKET DATA...';
                
                const response = await fetch(AM_SHEETS_API, { redirect: 'follow' });
                const raw = await response.json();
                
                ['large', 'mid', 'small'].forEach(cap => {
                    ['bullish', 'bearish'].forEach(trend => {
                        if (raw[cap] && raw[cap][trend]) {
                            raw[cap][trend].forEach(s => {
                                stockData[s.ticker] = {
                                    name: s.name, 
                                    cap: cap, 
                                    sector: s.sector || "General", 
                                    price: s.price,
                                    changes: s.changes || { "1w": 0, "1m": 0, "3m": 0 },
                                    divAmount: s.divAmount || 0, 
                                    divYield: s.divYield || 0, 
                                    exDate: s.exDate || "N/A",
                                    funda: s.funda || null,
                                    riskMetrics: s.riskMetrics || null
                                };
                            });
                        }
                    });
                });
                
                filterAllStocks();
                filterStocks();
                renderDividendTable();
                renderHighRiskTable();
                
                document.getElementById('all-directory-count').innerText = 'LIVE SYNC COMPLETE';

            } catch (e) { 
                console.error("Live Sync Failed:", e); 
                document.getElementById('all-directory-count').innerText = 'LIVE SYNC FAILED - CHECK INTERNET OR PRIVACY SETTINGS';
            }
        }

        // Initialize App on load
        fetchLiveMarketData();
    </script>
</body>
</html>
