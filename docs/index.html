<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Stock Screener & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Custom scrollbar styling for a cleaner dark theme interface */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans min-h-screen flex flex-col selection:bg-zinc-800 selection:text-zinc-200">

    <div class="tradingview-widget-container border-b border-zinc-800" style="width: 100%; height: 46px; background: #000;">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
            "symbols": [
                { "description": "NIFTY 50 (ETF)", "proName": "BSE:NIFTYBEES" },
                { "description": "BANK NIFTY (ETF)", "proName": "BSE:BANKBEES" },
                { "description": "RELIANCE", "proName": "BSE:RELIANCE" },
                { "description": "TCS", "proName": "BSE:TCS" },
                { "description": "HDFC BANK", "proName": "BSE:HDFCBANK" },
                { "description": "INFOSYS", "proName": "BSE:INFY" }
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "en"
        }
        </script>
    </div>

    <div class="flex-1 flex flex-col max-w-[1600px] w-full mx-auto p-4 md:p-6 space-y-6 overflow-hidden">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-4 border-b border-zinc-800 gap-4 shrink-0">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-zinc-100 flex items-center gap-2">
                    <span>📈</span> INDIAN STOCK SCREENER
                </h1>
                <p class="text-xs text-zinc-500 mt-0.5 font-mono" id="all-directory-count">INITIALIZING DASHBOARD...</p>
            </div>
            <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl font-mono text-xs text-zinc-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>LOCAL FILE SYSTEM MODE</span>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden min-h-[500px]">
            
            <section class="lg:col-span-2 flex flex-col bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden shadow-2xl">
                <div class="p-4 bg-zinc-900/50 border-b border-zinc-900 flex flex-col sm:flex-row gap-3 items-center justify-between shrink-0">
                    <div class="relative w-full sm:w-72">
                        <input type="text" id="search-input" oninput="filterStocks()" placeholder="Search symbols (e.g. RELIANCE)..." 
                               class="w-full bg-zinc-900 border border-zinc-800 text-xs rounded-xl px-3 py-2 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-zinc-700 font-mono transition-colors">
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                        <button onclick="setCapFilter('all')" id="btn-cap-all" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700">ALL</button>
                        <button onclick="setCapFilter('large')" id="btn-cap-large" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300">LARGE</button>
                        <button onclick="setCapFilter('mid')" id="btn-cap-mid" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300">MID</button>
                        <button onclick="setCapFilter('small')" id="btn-cap-small" class="px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300">SMALL</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-2" id="stock-directory-list">
                    </div>
            </section>

            <section class="flex flex-col bg-zinc-950 border border-zinc-900 rounded-2xl p-4 overflow-hidden shadow-2xl space-y-4" id="detail-pane">
                <div class="flex-1 flex flex-col items-center justify-center text-center p-6 text-zinc-600 font-mono space-y-2">
                    <span class="text-2xl">🔍</span>
                    <p class="text-xs uppercase tracking-wider">Select a stock ticker to analyze fundamental metrics natively</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Global state dictionary holding parsed stock items
        let stockData = {};
        let currentCapFilter = 'all';
        let activeSelectedTicker = null;

        // Initialize connection to file asset immediately on layout mount
        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveMarketData();
        });

        // REPLACED: Core implementation reading local bhavcopy.csv directly
        async function fetchLiveMarketData() {
            try {
                document.getElementById('all-directory-count').innerText = 'READING NSE DATA...';
                
                // Fetch the CSV file sitting right next to index.html on GitHub
                const response = await fetch('bhavcopy.csv');
                if (!response.ok) throw new Error("Could not find bhavcopy.csv");
                const csvText = await response.text();
                
                // Convert the CSV into clean data structures using PapaParse
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const rawData = results.data;
                        stockData = {}; 
                        
                        rawData.forEach(row => {
                            // Extract symbol dynamically supporting various common capitalization schemas
                            const ticker = row['SYMBOL'] || row['TckrSymb'] || row['Symbol'];
                            if (!ticker || ticker === "NIFTY") return;
                            
                            const closePrice = parseFloat(row['CLOSE'] || row['ClsPric'] || row['Close'] || 0);
                            const prevClose = parseFloat(row['PREVCLOSE'] || row['PrvsClsgPric'] || row['PrevClose'] || closePrice);
                            const dailyChangePct = prevClose > 0 ? ((closePrice - prevClose) / prevClose) * 100 : 0;
                            
                            stockData[ticker] = {
                                name: ticker + " (NSE Equity)", 
                                cap: "all", 
                                sector: "Equities Market", 
                                price: closePrice,
                                changes: { "1w": dailyChangePct, "1m": dailyChangePct, "3m": dailyChangePct },
                                divAmount: 0, 
                                divYield: 0, 
                                exDate: "N/A",
                                funda: { pe: 'N/A', de: 'N/A' },
                                riskMetrics: { threat: "N/A", award: "N/A", beta: "1.0" }
                            };
                        });
                        
                        filterAllStocks();
                        document.getElementById('all-directory-count').innerText = `SYNC COMPLETE: LOADED ${Object.keys(stockData).length} EQUITIES FROM BHAVCOPY`;
                    }
                });

            } catch (e) { 
                console.error("Data Load Failed:", e); 
                document.getElementById('all-directory-count').innerText = 'FAILED TO READ bhavcopy.csv - Ensure it is committed next to index.html';
            }
        }

        function filterAllStocks() {
            filterStocks();
        }

        function setCapFilter(cap) {
            currentCapFilter = cap;
            ['all', 'large', 'mid', 'small'].forEach(c => {
                const btn = document.getElementById(`btn-cap-${c}`);
                if(c === cap) {
                    btn.className = "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-800 text-zinc-200 border border-zinc-700";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all bg-zinc-900 text-zinc-500 border border-transparent hover:text-zinc-300";
                }
            });
            filterStocks();
        }

        function filterStocks() {
            const searchVal = document.getElementById('search-input').value.toUpperCase().trim();
            const container = document.getElementById('stock-directory-list');
            container.innerHTML = '';
            
            let keys = Object.keys(stockData);
            if(searchVal) {
                keys = keys.filter(k => k.includes(searchVal));
            }
            
            if(keys.length === 0) {
                container.innerHTML = `<div class="text-center font-mono text-xs text-zinc-700 py-8">No active ticker matches found</div>`;
                return;
            }
            
            keys.forEach(ticker => {
                const data = stockData[ticker];
                const change = data.changes["1w"];
                const changeColor = change >= 0 ? "text-emerald-500" : "text-rose-500";
                const changeSign = change >= 0 ? "+" : "";
                const isSelected = activeSelectedTicker === ticker ? 'border-zinc-700 bg-zinc-900/60' : 'border-zinc-900 bg-zinc-950 hover:bg-zinc-900/30';
                
                const div = document.createElement('div');
                div.className = `p-3 border rounded-xl flex items-center justify-between cursor-pointer transition-all ${isSelected}`;
                div.onclick = () => selectTicker(ticker);
                div.innerHTML = `
                    <div class="font-mono">
                        <div class="text-xs font-bold text-zinc-200">${ticker}</div>
                        <div class="text-[10px] text-zinc-600 mt-0.5 truncate max-w-[180px] sm:max-w-none">${data.name}</div>
                    </div>
                    <div class="text-right font-mono">
                        <div class="text-xs font-bold text-zinc-300">₹${data.price.toLocaleString('en-IN', {minimumFractionDigits: 2})}</div>
                        <div class="text-[10px] ${changeColor} font-bold mt-0.5">${changeSign}${change.toFixed(2)}%</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function selectTicker(ticker) {
            activeSelectedTicker = ticker;
            filterStocks(); // update borders
            
            const pane = document.getElementById('detail-pane');
            const data = stockData[ticker];
            
            pane.innerHTML = `
                <div class="flex items-center justify-between pb-3 border-b border-zinc-900 shrink-0">
                    <div class="font-mono">
                        <h2 class="text-sm font-bold text-zinc-200">${ticker}</h2>
                        <p class="text-[10px] text-zinc-500 mt-0.5">${data.sector}</p>
                    </div>
                    <div class="text-right font-mono">
                        <p class="text-xs font-bold text-zinc-200">₹${data.price.toLocaleString('en-IN')}</p>
                    </div>
                </div>
                
                <div class="space-y-4 flex-1 overflow-y-auto pr-2 pb-6">
                    <div class="p-3 rounded-xl border text-center font-mono font-bold text-xs tracking-wide shrink-0 bg-zinc-900 border-zinc-800 text-zinc-400">
                        🏛️ NATIVE FINANCIAL SCORECARD
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 font-mono text-[11px]">
                        <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/80 shadow-sm flex flex-col justify-between">
                            <span class="text-zinc-500 uppercase tracking-wider mb-1">Current Price</span>
                            <span class="text-zinc-200 font-bold text-sm">₹${data.price.toLocaleString('en-IN')}</span>
                        </div>
                        <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/80 shadow-sm flex flex-col justify-between">
                            <span class="text-zinc-500 uppercase tracking-wider mb-1">Sector</span>
                            <span class="text-zinc-200 font-bold text-sm truncate">${data.sector}</span>
                        </div>
                        <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/80 shadow-sm flex flex-col justify-between group">
                            <span class="text-zinc-500 uppercase tracking-wider mb-1">P/E Ratio</span>
                            <span class="text-sky-400 font-bold text-sm">N/A</span>
                        </div>
                        <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/80 shadow-sm flex flex-col justify-between group">
                            <span class="text-zinc-500 uppercase tracking-wider mb-1">Debt / Equity</span>
                            <span class="text-purple-400 font-bold text-sm">N/A</span>
                        </div>
                    </div>
                    
                    <div class="mt-4 p-4 bg-zinc-900/30 border border-zinc-800/50 rounded-xl">
                         <p class="text-[10px] text-zinc-500 font-mono leading-relaxed text-center">
                            Note: End-of-Day price values are successfully loaded from your committed nse bhavcopy file. Fundamental metrics require manual schema configuration or premium endpoint feeds.
                         </p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
