<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBK NiftyPulse Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen font-sans selection:bg-emerald-500/30">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-white">RBK Nifty<span class="text-emerald-400">Pulse</span> Scanner</h1>
            <p class="text-[11px] text-zinc-500 font-mono mt-2 uppercase">Live Terminal (Source: Google Sheets)</p>
        </header>

        <main id="all-stock-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></main>
    </div>

    <div id="workspace-overlay" class="hidden"></div>

    <script>
        // 1. YOUR API URL
        const AM_SHEETS_API = "https://script.google.com/macros/s/AKfycbwwyyH3aWB90MVa7Syw87wZSU3lEMe6twlVD4xVzJVaZF0AV_PSFU9Q-QCyjHrb5wI0FA/exec";
        
        let stockData = {};

        // 2. FETCH DATA FROM YOUR SHEET
        async function fetchLiveMarketData() {
            try {
                const response = await fetch(AM_SHEETS_API);
                const raw = await response.json();
                
                // Convert your JSON response into the format your UI expects
                stockData = {};
                ['large', 'mid', 'small'].forEach(cap => {
                    ['bullish', 'bearish'].forEach(trend => {
                        raw[cap][trend].forEach(s => {
                            stockData[s.ticker] = { 
                                name: s.name, cap: s.cap, sector: s.sector, price: s.price, 
                                changes: { "1w": 0, "1m": s.change, "3m": 0 },
                                tech: { rsi: 60, pivot: "Live" }
                            };
                        });
                    });
                });
                renderUI();
            } catch (e) { console.error("Sync Error:", e); }
        }

        // 3. RENDER FUNCTION
        function renderUI() {
            const grid = document.getElementById('all-stock-grid');
            grid.innerHTML = '';
            Object.entries(stockData).forEach(([ticker, data]) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900/40 border border-zinc-800 p-4 rounded-xl cursor-pointer hover:border-emerald-500 transition-all";
                card.onclick = () => openWorkspace(ticker);
                card.innerHTML = `
                    <h3 class="font-bold">${ticker}</h3>
                    <p class="text-[10px] text-zinc-500">${data.name}</p>
                    <p class="text-emerald-400 font-mono mt-2">₹${data.price} <span class="text-[10px] text-zinc-600">${data.changes['1m']}%</span></p>
                `;
                grid.appendChild(card);
            });
        }

        // 4. WORKSPACE TERMINAL
        window.openWorkspace = function(ticker) {
            const overlay = document.getElementById('workspace-overlay');
            overlay.className = "fixed inset-0 bg-black/95 z-50 flex flex-col";
            overlay.innerHTML = `
                <div class="flex justify-between p-4 border-b border-zinc-800">
                    <span class="font-bold text-emerald-400">■ WORKSPACE: ${ticker}</span>
                    <button onclick="closeWorkspace()" class="text-zinc-400 font-mono">✕ CLOSE</button>
                </div>
                <div id="tv-chart-frame" class="flex-1 p-2"></div>
            `;
            overlay.classList.remove('hidden');

            setTimeout(() => {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": `NSE:${ticker}`, 
                    "interval": "D",
                    "theme": "dark",
                    "container_id": "tv-chart-frame"
                });
            }, 100);
        };

        window.closeWorkspace = () => document.getElementById('workspace-overlay').classList.add('hidden');

        // RUN ON LOAD
        fetchLiveMarketData();
    </script>
</body>
</html>
