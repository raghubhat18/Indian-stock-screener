name: Update bhavcopy date index

# Runs automatically whenever files change inside data/bhavcopy/
# Also runs manually from the Actions tab (needed once for your existing 68 files)
on:
  push:
    paths:
      - 'data/bhavcopy/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate data/dates.json from filenames in data/bhavcopy
        run: |
          cd data/bhavcopy
          ls *.csv | sed 's/\.csv$//' | sort | jq -R -s -c 'split("\n")[:-1]' > ../dates.json
          cd ../..
          echo "Generated dates.json:"
          cat data/dates.json

      - name: Commit updated dates.json (only if it changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dates.json
          git diff --staged --quiet || git commit -m "Auto-update dates.json"
          git push
