name: Update cached news

# Runs automatically every day after market close (no manual triggering needed).
# Covers ALL tracked companies using parallel workers - takes ~12-15 minutes.
# Server-side fetch = no browser CORS restrictions, no proxy dependency.
on:
  schedule:
    - cron: '0 12 * * 1-5'    # 5:30 PM IST, Mon-Fri (after market close)
  workflow_dispatch:           # keep manual trigger as backup

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch news for all tracked companies
        run: |
          python3 - << 'EOF'
          import csv, json, time, os
          import urllib.request, urllib.parse
          import xml.etree.ElementTree as ET
          from concurrent.futures import ThreadPoolExecutor, as_completed

          CAP_FILE  = 'docs/data/market-cap.csv'
          OUT_FILE  = 'docs/data/news.json'
          MAX_ITEMS = 5
          MAX_WORKERS = 8    # 8 parallel - fast but not aggressive towards Google
          TIMEOUT   = 10     # seconds per request

          if not os.path.exists(CAP_FILE):
              print(f"{CAP_FILE} not found - skipping.")
              exit(0)

          # Load ALL symbols from market-cap.csv regardless of category
          symbols = []
          with open(CAP_FILE, encoding='utf-8-sig') as f:
              for row in csv.DictReader(f):
                  sym = (row.get('Symbol') or '').strip().upper()
                  if sym:
                      symbols.append(sym)

          symbols = sorted(set(symbols))
          print(f"Fetching news for {len(symbols)} companies "
                f"using {MAX_WORKERS} parallel workers...")

          UA = 'Mozilla/5.0 (compatible; RBK-Stock-Screener/1.0; personal use)'

          def fetch_one(symbol):
              query = urllib.parse.quote(f"{symbol} stock India news")
              url   = (f"https://news.google.com/rss/search"
                       f"?q={query}&hl=en-IN&gl=IN&ceid=IN:en")
              req   = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
                  xml_bytes = resp.read()
              root  = ET.fromstring(xml_bytes)
              items = []
              for item in root.findall('.//item')[:MAX_ITEMS]:
                  title    = (item.findtext('title')   or '').strip()
                  link     = (item.findtext('link')    or '').strip()
                  pub_date = (item.findtext('pubDate') or '').strip()
                  src_el   = item.find('source')
                  source   = (src_el.text or '').strip() if src_el is not None else ''
                  if title and link:
                      items.append({'title': title, 'link': link,
                                    'pubDate': pub_date, 'source': source})
              return symbol, items

          results = {}
          errors  = 0
          done    = 0
          start   = time.time()

          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as pool:
              futures = {pool.submit(fetch_one, s): s for s in symbols}
              for future in as_completed(futures):
                  sym = futures[future]
                  done += 1
                  try:
                      symbol, items = future.result()
                      if items:
                          results[symbol] = items
                  except Exception as e:
                      errors += 1
                  if done % 100 == 0:
                      elapsed = time.time() - start
                      eta = (elapsed / done) * (len(symbols) - done)
                      print(f"  ...{done}/{len(symbols)} done "
                            f"({elapsed:.0f}s elapsed, ~{eta:.0f}s remaining)")

          os.makedirs(os.path.dirname(OUT_FILE), exist_ok=True)
          with open(OUT_FILE, 'w', encoding='utf-8') as f:
              json.dump({
                  'updatedAt': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
                  'news': results
              }, f, ensure_ascii=False, indent=1)

          elapsed = time.time() - start
          print(f"\nDone in {elapsed:.0f}s. "
                f"{len(results)} companies with news, "
                f"{errors} errors. Wrote {OUT_FILE}")
          EOF

      - name: Commit updated news.json (only if it changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --staged --quiet || git commit -m "Auto-update daily news cache"
          git pull --rebase origin main
          git push
