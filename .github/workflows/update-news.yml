name: Update cached news

# Runs on a schedule (server-to-server, not subject to browser CORS at all).
# Scoped to the Large/Mid cap list (data/market-cap.csv) to keep request volume
# modest and respectful - not hammering Google's servers.
on:
  schedule:
    - cron: '30 4,10,16 * * 1-5'   # ~10:00, 15:30, 21:30 IST, Mon-Fri (market days)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch news for tracked companies
        run: |
          python3 - << 'EOF'
          import csv
          import json
          import time
          import urllib.request
          import urllib.parse
          import xml.etree.ElementTree as ET
          import os

          CAP_FILE = 'docs/data/market-cap.csv'
          OUT_FILE = 'docs/data/news.json'
          MAX_ITEMS_PER_STOCK = 5
          REQUEST_DELAY_SECONDS = 0.6   # be polite - don't hammer the feed

          # Load the symbol list we already curate for Large/Mid cap filtering.
          # If it doesn't exist yet, there's nothing to fetch - exit quietly.
          if not os.path.exists(CAP_FILE):
              print(f"{CAP_FILE} not found - skipping (add market-cap.csv first).")
              exit(0)

          symbols = []
          with open(CAP_FILE, encoding='utf-8-sig') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  sym = (row.get('Symbol') or '').strip().upper()
                  if sym:
                      symbols.append(sym)

          symbols = sorted(set(symbols))
          print(f"Fetching news for {len(symbols)} companies...")

          results = {}
          errors = 0

          for i, symbol in enumerate(symbols):
              query = urllib.parse.quote(f"{symbol} stock India news")
              url = f"https://news.google.com/rss/search?q={query}&hl=en-IN&gl=IN&ceid=IN:en"

              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (compatible; RBK-Stock-Screener/1.0; personal use)'})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      xml_bytes = resp.read()

                  root = ET.fromstring(xml_bytes)
                  items = []
                  for item in root.findall('.//item')[:MAX_ITEMS_PER_STOCK]:
                      title = (item.findtext('title') or '').strip()
                      link = (item.findtext('link') or '').strip()
                      pub_date = (item.findtext('pubDate') or '').strip()
                      source_el = item.find('source')
                      source = (source_el.text or '').strip() if source_el is not None else 'Market Update'
                      if title and link:
                          items.append({'title': title, 'link': link, 'pubDate': pub_date, 'source': source})

                  if items:
                      results[symbol] = items

              except Exception as e:
                  errors += 1
                  print(f"  ! {symbol}: {e}")

              if (i + 1) % 25 == 0:
                  print(f"  ...{i+1}/{len(symbols)} done")

              time.sleep(REQUEST_DELAY_SECONDS)

          os.makedirs(os.path.dirname(OUT_FILE), exist_ok=True)
          with open(OUT_FILE, 'w', encoding='utf-8') as f:
              json.dump({'updatedAt': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()), 'news': results}, f, ensure_ascii=False, indent=1)

          print(f"Done. {len(results)} companies with news, {errors} errors. Wrote {OUT_FILE}")
          EOF

      - name: Commit updated news.json (only if it changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --staged --quiet || git commit -m "Auto-update cached news"
          git pull --rebase origin main
          git push
