name: Daily Indian Stock Analysis

on:
  schedule:
    # Runs Monday through Friday at 10:30 AM UTC (4:00 PM IST) right after market close
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # Allows manual run at any time

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install yfinance pandas

    - name: Run Screener Algorithm
      run: python screener.py

    - name: Commit data changes back to repo
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add docs/data.json
        git diff-index --quiet HEAD || git commit -m "Automated update: daily multi-timeframe analysis"
        git push
