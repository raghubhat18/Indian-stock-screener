name: Weekly Indian Stock Analysis

on:
  schedule:
    # Runs every Saturday morning at 6:00 AM UTC (11:30 AM IST) when markets are closed
    - cron: '0 6 * * 6'
  workflow_dispatch: # Allows you to manually trigger it anytime with a button click

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/connected-manifest@v1 # Alternative helper or just direct use
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install yfinance pandas

    - name: Run Screener Algorithm
      run: python screener.py

    - name: Commit data changes back to repo
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add docs/data.json
        git diff-index --quiet HEAD || git commit -m "Automated update: latest short term stocks"
        git push
